# Resource Governor Policies (stub)
#
# This file defines example policies for development and local testing.
# In production, prefer RG_POLICY_STORE=db with policies managed via AuthNZ.

schema_version: 1

hot_reload:
  enabled: true
  interval_sec: 5  # watcher/TTL interval for file store

metadata:
  description: Default example policies for tldw_server Resource Governor
  owner: core-platform
  version: 1

# Global defaults applied when a policy omits a field.
defaults:
  fail_mode: fail_closed  # can be overridden per policy
  algorithm:
    requests: token_bucket   # token_bucket | sliding_window
    tokens: token_bucket     # preferred for model tokens
  scopes_order: [global, tenant, user, api_key, conversation, client, ip, service, entity]

# Policy templates (anchors) for quick customization.
templates:
  core: &core_policy
    requests: { rpm: 120, burst: 1.2 }
    scopes: [global, user, api_key, ip]
    fail_mode: fallback_memory
  mcp_base: &mcp_base
    requests: { rpm: 60, burst: 1.0 }
    scopes: [global, user, client, api_key]
    fail_mode: fallback_memory  # acceptable local over-admission during outages

policies:
  # Core defaults for endpoints without explicit module-level policies.
  core.default: *core_policy

  # Chat API: per-user and per-conversation controls
  chat.default:
    requests: { rpm: 120, burst: 2.0 }
    tokens:   { per_min: 60000, burst: 1.5 }
    # Include api_key so ingress enforcement works before auth deps resolve user_id.
    scopes: [global, user, api_key, conversation]
    fail_mode: fail_closed

  # MCP ingestion/read paths
  mcp.ingestion:
    <<: *mcp_base

  mcp.default:
    <<: *mcp_base

  mcp.read:
    <<: *mcp_base
    requests: { rpm: 120, burst: 1.0 }  # Higher limit for read ops

  # AuthNZ guardrails (login, reset-password, etc.)
  # Applied by RG ingress via /api/v1/auth* route_map entries.
  authnz.default:
    requests: { rpm: 60, burst: 1.0 }
    scopes: [global, entity]

  # AuthNZ sensitive endpoint policies (endpoint-level + ingress mapping).
  authnz.forgot_password:
    requests: { rpm: 10, burst: 1.0 }
    scopes: [global, entity]

  authnz.reset_password:
    # Equivalent to ~20 attempts/5 minutes with burst allowance.
    requests: { rpm: 4, burst: 5.0 }
    scopes: [global, entity]

  authnz.resend_verification:
    requests: { rpm: 10, burst: 1.0 }
    scopes: [global, entity]

  authnz.magic_link.request:
    requests: { rpm: 10, burst: 1.0 }
    scopes: [global, entity]

  authnz.magic_link.email:
    # Approximate 3 requests per 10 minutes per normalized email identity.
    requests: { rpm: 0.3, burst: 10.0 }
    scopes: [entity]

  authnz.mfa.verify:
    requests: { rpm: 10, burst: 1.0 }
    scopes: [global, entity]

  authnz.mfa.login:
    requests: { rpm: 10, burst: 1.0 }
    scopes: [global, entity]

  # Embeddings service (OpenAI-compatible)
  embeddings.default:
    requests: { rpm: 60, burst: 1.2 }
    scopes: [user, api_key]

  # Embeddings server (worker / internal service)
  embeddings_server.default:
    requests: { rpm: 120, burst: 2.0 }
    scopes: [service]
    fail_mode: fallback_memory

  # Audio: concurrency via streams + durable minutes cap
  audio.default:
    # Allow reasonable request rate so informational GETs (status/limits)
    # are not denied by middleware. Concurrency/minutes are enforced separately.
    requests: { rpm: 300, burst: 2.0 }
    streams: { max_concurrent: 2, ttl_sec: 90 }
    jobs:    { max_concurrent: 2, ttl_sec: 600 }
    minutes: { daily_cap: 120, rounding: ceil }
    scopes: [user, api_key, ip]
    fail_mode: fail_closed

  # Character Chat / Characters module (legacy per-user limiter compat)
  character_chat.default:
    requests: { rpm: 60, burst: 1.0 }
    scopes: [user, api_key]

  # Evaluations module
  evals.default:
    # Ingress middleware enforces `requests` for `/api/v1/evaluations/*`.
    # The Evaluations module reserves `evaluations` (+ optional `tokens`) at
    # endpoint-level to enforce durable caps via `ResourceDailyLedger`.
    requests: { rpm: 30, burst: 1.0 }
    evaluations: { daily_cap: 500 }
    tokens: { per_min: 1000000, burst: 1.0, daily_cap: 500000 }
    scopes: [user, api_key]

  # Evaluations tier policies (used by the evaluations module)
  evals.free:
    evaluations: { per_min: 10, burst: 1.5, daily_cap: 100 }
    tokens: { per_min: 0, burst: 1.0, daily_cap: 100000 }
    scopes: [user, api_key]
  evals.basic:
    evaluations: { per_min: 30, burst: 1.33, daily_cap: 1000 }
    tokens: { per_min: 0, burst: 1.0, daily_cap: 1000000 }
    scopes: [user, api_key]
  evals.premium:
    evaluations: { per_min: 100, burst: 1.25, daily_cap: 10000 }
    tokens: { per_min: 0, burst: 1.0, daily_cap: 10000000 }
    scopes: [user, api_key]
  evals.enterprise:
    evaluations: { per_min: 500, burst: 1.2, daily_cap: 100000 }
    tokens: { per_min: 0, burst: 1.0, daily_cap: 100000000 }
    scopes: [user, api_key]

  evals.free.batch:
    evaluations: { per_min: 2, burst: 3.5, daily_cap: 100 }
    tokens: { per_min: 0, burst: 1.0, daily_cap: 100000 }
    scopes: [user, api_key]
  evals.basic.batch:
    evaluations: { per_min: 5, burst: 3.0, daily_cap: 1000 }
    tokens: { per_min: 0, burst: 1.0, daily_cap: 1000000 }
    scopes: [user, api_key]
  evals.premium.batch:
    evaluations: { per_min: 20, burst: 2.25, daily_cap: 10000 }
    tokens: { per_min: 0, burst: 1.0, daily_cap: 10000000 }
    scopes: [user, api_key]
  evals.enterprise.batch:
    evaluations: { per_min: 100, burst: 2.0, daily_cap: 100000 }
    tokens: { per_min: 0, burst: 1.0, daily_cap: 100000000 }
    scopes: [user, api_key]

  # Web scraping service (internal service scope).
  # Used by the research/websearch module to fetch external pages.
  # Limits are moderate (60 rpm) to avoid hammering upstream sites while
  # keeping local scrapers responsive. `fail_mode=fallback_memory` keeps
  # scraping available during RG store outages by falling back to in-memory
  # limits for this internal-only traffic.
  web_scraping.default:
    requests: { rpm: 60, burst: 1.0 }
    scopes: [service]
    fail_mode: fallback_memory

  # Research / websearch endpoints.
  # Applied at ingress for `/api/v1/research/*` (per-user/api_key). The
  # 30 rpm default balances responsiveness with protection against abusive
  # fan‑out across third‑party search/content providers. Tokens are not
  # accounted here; upstream provider quotas remain the primary guardrail.
  research.default:
    requests: { rpm: 30, burst: 1.0 }
    scopes: [user, api_key]

  # Workflows (ad-hoc runs, schedules, admin).
  # Ingress limits bound request rate, while `workflows_runs.daily_cap`
  # integrates with the Workflows daily ledger/RG helpers to enforce a
  # durable per-user daily runs cap. The default cap (1000) aligns with
  # the WORKFLOWS_QUOTA_DAILY_PER_USER env fallback used by the API.
  workflows.default:
    requests: { rpm: 60, burst: 1.0 }
    workflows_runs: { daily_cap: 1000 }
    scopes: [user, api_key]

  # Prompt Studio API (projects/prompts/tests/optimization).
  # Policies are applied primarily at ingress for `/api/v1/prompt-studio/*`.
  # Request limits are intentionally high so most safety/abuse controls are
  # handled by AuthNZ module‑level limits (per‑operation) rather than RG.
  prompt_studio.default:
    # Keep high to avoid interfering with per-operation AuthNZ limits.
    requests: { rpm: 300, burst: 2.0 }
    scopes: [user, api_key]

  # RAG unified/health endpoints.
  # Covers `/api/v1/rag/*` including unified search and health checks. The
  # 120 rpm default is tuned for interactive usage and small teams; scale
  # out by overriding in DB-backed policy stores for larger deployments.
  rag.default:
    requests: { rpm: 120, burst: 1.2 }
    scopes: [user, api_key]

  # Media ingestion/processing endpoints.
  # Applied to ingest/process routes under `/api/v1/media/*` (add, process-*, ingest-web-content, mediawiki).
  # Media processing is CPU/IO heavy, so limits are slightly conservative
  # (600 rpm, modest burst) to prevent local saturation while still allowing
  # concurrent ingestion workflows in development.
  media.default:
    requests: { rpm: 600, burst: 1.2 }
    jobs: { max_concurrent: 2, ttl_sec: 1800 }
    ingestion_bytes: { daily_cap: 2147483648 }
    scopes: [user, api_key]

  # Media access endpoints (listing, item retrieval, file download).
  # This is intentionally higher than ingestion limits so browsing doesn't
  # contend with ingestion quotas.
  media.access:
    requests: { rpm: 6000, burst: 1.2 }
    scopes: [user, api_key]

  # Lightweight extension/web handoff resolves source and workspace state
  # before the hosted app finishes auth/subscription routing, so these routes
  # must still permit IP-scoped requests.
  media.video_lite.access:
    requests: { rpm: 6000, burst: 1.2 }
    scopes: [user, api_key, ip]

  # Chatbooks import/export endpoints (legacy ingress compat → RG).
  # Covers `/api/v1/chatbooks/*` used for conversation backup/restore and bulk
  # user-data transfer (export/import). Limits are intentionally conservative
  # (5 rpm, no burst) to prevent accidental or abusive bulk operations that
  # can create heavy DB/file I/O and large payloads. Preview/download are
  # slightly higher to support iterative validation and retrieval of prepared
  # artifacts. Include `ip` in scope as an additional safety valve for shared
  # API keys and to align with legacy ingress behavior.
  chatbooks.export:
    requests: { rpm: 5, burst: 1.0 }
    scopes: [user, api_key, ip]

  chatbooks.import:
    requests: { rpm: 5, burst: 1.0 }
    scopes: [user, api_key, ip]

  chatbooks.preview:
    requests: { rpm: 10, burst: 1.0 }
    scopes: [user, api_key, ip]

  chatbooks.download:
    requests: { rpm: 20, burst: 1.0 }
    scopes: [user, api_key, ip]

  # Watchlists API endpoints (sources/groups/tags/jobs/runs).
  # Applied at ingress for `/api/v1/watchlists/*`. Watchlists can trigger
  # background fetch/scrape work and external fan-out, so defaults are tuned
  # for interactive usage (60 rpm) without enabling bulk abuse. Include `ip`
  # in scope to add a per-client throttle when API keys are shared.
  watchlists.default:
    requests: { rpm: 60, burst: 1.0 }
    scopes: [user, api_key, ip]

