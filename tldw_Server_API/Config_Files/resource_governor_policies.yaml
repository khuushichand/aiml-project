# Resource Governor Policies (stub)
#
# This file defines initial example policies for the ResourceGovernor.
# It is hot‑reloadable by the server when policy reload is enabled.
#
# Notes:
# - RG_* environment variables take precedence over values here.
# - Per-module feature flags (e.g., RG_ENABLE_CHAT) control integration enablement.
# - The 'fail_mode' can override RG_REDIS_FAIL_MODE for a given policy.
# - Scopes are evaluated with strictest-wins semantics (min headroom).
# - Token units are model tokens when available, otherwise estimated generic tokens.

version: 1

reload:
  enabled: true
  interval_sec: 10

policies:
  ingress.default:
    requests:
      rpm: 1200
      burst: 1.0
    scopes: [global, ip]
    fail_mode: fail_closed

  chat.default:
    requests:
      rpm: 120
      burst: 2.0
    tokens:
      per_min: 60000
      burst: 1.5
    scopes: [global, user, conversation]
    fail_mode: fail_closed

  mcp.ingestion:
    requests:
      rpm: 60
      burst: 1.0
    scopes: [global, client]
    fail_mode: fallback_memory

  audio.default:
    minutes:
      daily_cap: 120
    streams:
      max_concurrent: 2
      ttl_sec: 60
    scopes: [user]
    fail_mode: fail_closed

  embeddings.default:
    requests:
      rpm: 300
      burst: 2.0
    scopes: [global, user]
    fail_mode: fail_closed

# Tenancy
tenant:
  # Include per-tenant scoping early; no-op unless populated.
  enabled: false
  # Examples: header or claim used to derive tenant id when enabled.
  header: X-TLDW-Tenant
  jwt_claim: tenant_id

