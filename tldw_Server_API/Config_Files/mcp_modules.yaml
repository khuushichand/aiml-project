modules:
  - id: media
    class: tldw_Server_API.app.core.MCP_unified.modules.implementations.media_module:MediaModule
    enabled: true
    name: Media
    version: "1.0.0"
    department: media
    # Module runtime controls (optional)
    # Limit concurrent operations per module instance (0 disables guard)
    max_concurrent: 16
    # Circuit breaker settings
    circuit_breaker_threshold: 3           # failures before breaker opens
    circuit_breaker_timeout: 30            # initial open window (seconds)
    circuit_breaker_backoff_factor: 2.0    # multiply timeout on half-open failure
    circuit_breaker_max_timeout: 180       # cap the backoff window (seconds)
    # Module-specific settings
    settings:
      # Per-user default example; change '1' if SINGLE_USER_FIXED_ID differs
      db_path: Databases/user_databases/1/Media_DB_v2.db
      cache_ttl: 300
  - id: template
    class: tldw_Server_API.app.core.MCP_unified.modules.implementations.template_module:TemplateModule
    enabled: true
    name: Template
    version: "1.0.0"
    department: demo
    settings: {}

  - id: mcp_discovery
    class: tldw_Server_API.app.core.MCP_unified.modules.implementations.mcp_discovery_module:MCPDiscoveryModule
    enabled: true
    name: MCP Discovery
    version: "1.0.0"
    department: system
    max_concurrent: 8
    settings: {}

  - id: external_federation
    class: tldw_Server_API.app.core.MCP_unified.modules.implementations.external_federation_module:ExternalFederationModule
    enabled: false
    name: External Federation
    version: "0.1.0"
    department: system
    max_concurrent: 8
    settings:
      external_servers_config_path: tldw_Server_API/Config_Files/mcp_external_servers.yaml

  - id: notes
    class: tldw_Server_API.app.core.MCP_unified.modules.implementations.notes_module:NotesModule
    enabled: true
    name: Notes
    version: "1.0.0"
    department: knowledge
    max_concurrent: 10
    settings: {}

  - id: kanban
    class: tldw_Server_API.app.core.MCP_unified.modules.implementations.kanban_module:KanbanModule
    enabled: true
    name: Kanban
    version: "1.0.0"
    department: planning
    max_concurrent: 10
    settings: {}

  - id: quizzes
    class: tldw_Server_API.app.core.MCP_unified.modules.implementations.quizzes_module:QuizzesModule
    enabled: true
    name: Quizzes
    version: "1.0.0"
    department: learning
    max_concurrent: 10
    settings: {}

  - id: flashcards
    class: tldw_Server_API.app.core.MCP_unified.modules.implementations.flashcards_module:FlashcardsModule
    enabled: true
    name: Flashcards
    version: "1.0.0"
    department: learning
    max_concurrent: 10
    settings: {}

  - id: slides
    class: tldw_Server_API.app.core.MCP_unified.modules.implementations.slides_module:SlidesModule
    enabled: true
    name: Slides
    version: "1.0.0"
    department: presentations
    max_concurrent: 8
    settings: {}

# Notes
# - Only modules under tldw_Server_API.app.core.MCP_unified.modules.implementations are allowed.
# - You can also specify modules via env: MCP_MODULES="media=tldw_Server_API.app.core.MCP_unified.modules.implementations.media_module:MediaModule"
