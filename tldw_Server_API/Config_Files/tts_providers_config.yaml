# TTS Providers Configuration
# This file configures all TTS providers and their settings

# Provider priority order (first available will be used by default)
provider_priority:
  - openai      # Reliable, high quality
  - kokoro      # Local, fast
  - kitten_tts  # Local ONNX voices with first-use model download
  - pocket_tts  # Local ONNX voice cloning
  - lux_tts     # Local ZipVoice voice cloning (48kHz)
  - supertonic  # Local Supertonic ONNX (requires assets)
  - supertonic2 # Local Supertonic2 ONNX (requires assets)
  - neutts      # Local, instant voice cloning (requires setup)
  - chatterbox  # Emotion control
  - dia         # Dialogue specialist
  - higgs       # Advanced multi-lingual
  - index_tts   # IndexTTS2 (local, expressive zero-shot)
  - pocket_tts_cpp # Local PocketTTS.cpp voice cloning
  - qwen3_tts   # Qwen3-TTS (local, multilingual; disabled by default)

# Provider-specific configurations
providers:
  # OpenAI TTS Configuration
  openai:
    enabled: true
    api_key: ${OPENAI_API_KEY}  # From environment or config.txt
    base_url: "https://api.openai.com/v1/audio/speech"
    model: "tts-1"  # or "tts-1-hd" for higher quality
    timeout: 60
    max_retries: 3
    # Optional: when true, perform a lightweight API-key verification
    # call during adapter initialization. Disabled by default so that
    # startup does not depend on external network availability.
    verify_api_key_on_init: false

  # Kokoro TTS Configuration
  kokoro:
    enabled: true
    use_onnx: false  # Default to PyTorch backend; set true to use ONNX
    # Recommended layouts:
    #   PyTorch:
    #     - model_path: models/kokoro/pytorch/model.pth
    #     - voices_json / voice_dir: models/kokoro/voices
    #   ONNX (opt-in):
    #     - model_path: models/kokoro/onnx/model.onnx (or another onnx variant)
    #     - voices_json: models/kokoro/onnx/voices-v1.0.bin (voices bundle file)
    # Default path for hexgrad/Kokoro-82M PyTorch checkpoint
    model_path: "models/kokoro/kokoro-v1_0.pth"
    # For kokoro-onnx>=0.3.x, voices_json must point to the voices bundle
    # file (e.g., voices-v1.0.bin), not the directory of per-voice .bin files.
    # When using ONNX, override this path accordingly.
    voices_json: "models/kokoro/voices"
    voice_dir: "models/kokoro/voices"  # For PyTorch variant (hexgrad/Kokoro-82M)
    device: "cpu"  # or "cuda" for GPU
    normalize_text: true
    sentence_splitting: true
    sample_rate: 24000
    # Long-text pacing
    pause_interval_words: 500
    pause_tag: "[pause=1.1]"
    # Chunking configuration
    target_min_tokens: 175
    target_max_tokens: 250
    absolute_max_tokens: 450

  # PocketTTS ONNX Configuration (local; voice cloning)
  pocket_tts:
    enabled: false  # Disabled by default; enable after installing assets
    model_path: "models/pocket_tts_onnx/onnx"  # Directory with ONNX files
    tokenizer_path: "models/pocket_tts_onnx/tokenizer.model"
    module_path: "models/pocket_tts_onnx"  # Directory containing pocket_tts_onnx.py or package
    precision: "int8"         # "int8" (CPU optimized) or "fp32"
    device: "auto"            # "auto" | "cpu" | "cuda"
    temperature: 0.7
    lsd_steps: 10
    max_frames: 500
    stream_first_chunk_frames: 2
    stream_target_buffer_sec: 0.2
    stream_max_chunk_frames: 15
    sample_rate: 24000

  # PocketTTS.cpp Configuration (local; voice cloning with cached stored voices)
  pocket_tts_cpp:
    enabled: false  # Disabled by default; enable after installing the native runtime
    binary_path: "bin/pocket-tts"
    model_path: "models/pocket_tts_cpp/onnx"
    tokenizer_path: "models/pocket_tts_cpp/tokenizer.model"
    device: "cpu"
    sample_rate: 24000
    enable_voice_cache: false
    cache_ttl_hours: 24
    cache_max_bytes_per_user: 1073741824
    persist_direct_voice_references: false

  # KittenTTS ONNX Configuration (local; English single-speaker voices)
  kitten_tts:
    enabled: false
    model: "KittenML/kitten-tts-nano-0.8"
    # Pin to an immutable HF commit; override only with another commit hash.
    model_revision: "8d6d5a1851ffd13c894c40227c888302c2a86ef7"
    device: "cpu"
    sample_rate: 24000
    auto_download: true
    extra_params:
      cache_dir: "cache/kitten_tts"
      clean_text: false

  # LuxTTS Configuration (ZipVoice-based voice cloning)
  lux_tts:
    enabled: false  # Disabled by default; requires LuxTTS checkout + dependencies
    model: "YatharthS/LuxTTS"  # HF repo id or local path
    module_path: "LuxTTS"     # Path to LuxTTS checkout (zipvoice package)
    device: "auto"            # "auto" | "cpu" | "cuda"
    threads: 4
    sample_rate: 48000
    reference_sample_rate: 24000
    extra_params:
      prompt_duration: 5
      prompt_rms: 0.001
      num_steps: 4
      guidance_scale: 3.0
      t_shift: 0.5
      return_smooth: false

  # Higgs Audio V2 Configuration
  higgs:
    enabled: false  # Disabled by default (requires large model)
    model_path: "bosonai/higgs-audio-v2-generation-3B-base"
    tokenizer_path: "bosonai/higgs-audio-v2-tokenizer"
    device: "cuda"  # Recommended: GPU
    use_fp16: true  # Use half precision for memory efficiency
    batch_size: 1
    sample_rate: 24000
    frame_rate: 25  # Audio tokenizer frame rate

  # Dia TTS Configuration
  dia:
    enabled: false  # Disabled by default (requires model download)
    model_path: "nari-labs/dia"
    device: "cuda"  # Recommended: GPU
    use_safetensors: true
    use_bf16: true  # Use bfloat16 for better precision
    sample_rate: 24000
    auto_detect_speakers: true
    max_speakers: 5

  # Chatterbox TTS Configuration
  chatterbox:
    enabled: false  # Disabled by default (requires installation)
    model_path: "resemble-ai/chatterbox"   # (unused in upstream >=0.1.4)
    device: "cuda"  # Recommended: GPU (also supports mps/cpu)
    use_multilingual: false  # Set true to enable 23-language model
    sample_rate: 24000
    disable_watermark: true  # Ensure no watermark is applied
    target_latency_ms: 200  # Progressive chunk size target

  # VibeVoice Configuration
  # Expressive multi-speaker TTS with optional background music and singing.
  # NOTE: Disabled by default and auto_download is false to prevent unsolicited model downloads.
  vibevoice:
    enabled: false               # Explicit opt-in required
    auto_download: false         # Do not download models unless allowed
    # Model variant and source
    variant: "1.5B"              # Options: "1.5B", "7B", "7B-Q8"
    model_path: "microsoft/VibeVoice-1.5B"  # HF repo id or local path (7B official: vibevoice/VibeVoice-7B; 7B-Q8: FabioSarracino/VibeVoice-Large-Q8)
    # Local storage paths (used when model_path is a repo id)
    model_dir: "models/vibevoice"  # Where to place downloaded files
    cache_dir: "cache/vibevoice"    # HF cache dir for snapshots
    # Runtime and audio settings
    device: "cpu"                # "cuda" | "mps" | "cpu"
    sample_rate: 24000
    voices_dir: "voices"         # Optional: folder with one-shot voice refs
    background_music: false
    enable_singing: false
    use_quantization: false      # 4-bit quantization (CUDA only)
    auto_cleanup: true
    # Generation controls
    attention_type: "auto"
    cfg_scale: 1.3
    diffusion_steps: 20
    temperature: 1.0
    top_p: 0.95
    top_k: 50
    # Streaming behavior
    stream_chunk_size: 0.25      # seconds
    stream_buffer_size: 4096

  # VibeVoice Realtime Configuration
  # Low-latency single-speaker streaming TTS.
  # NOTE: Disabled by default and auto_download is false to prevent unsolicited model downloads.
  vibevoice_realtime:
    enabled: false               # Explicit opt-in required
    auto_download: false         # Do not download models unless allowed
    model_path: "microsoft/VibeVoice-Realtime-0.5B"  # HF repo id or local path
    model_dir: "models/vibevoice_realtime"
    cache_dir: "cache/vibevoice_realtime"
    device: "cpu"                # "cuda" | "mps" | "cpu"
    sample_rate: 24000
    stream_chunk_ms: 40          # Target chunk size in milliseconds

  # Supertonic ONNX Configuration (local; user-supplied models)
  supertonic:
    enabled: false              # Disabled by default; enable after installing assets
    model_path: "models/supertonic/onnx"        # ONNX directory
    sample_rate: 24000
    device: "cpu"                # Placeholder for future GPU support
    extra_params:
      voice_styles_dir: "models/supertonic/voice_styles"
      default_voice: "supertonic_m1"
      voice_files:
        supertonic_m1: "M1.json"
        supertonic_f1: "F1.json"
      default_total_step: 5
      default_speed: 1.05
      n_test: 1

  # Supertonic2 ONNX Configuration (local; user-supplied models)
  supertonic2:
    enabled: false              # Disabled by default; enable after installing assets
    model_path: "models/supertonic2/onnx"        # ONNX directory
    sample_rate: 24000
    device: "cpu"                # Placeholder for future GPU support
    extra_params:
      voice_styles_dir: "models/supertonic2/voice_styles"
      default_voice: "supertonic2_m1"
      voice_files:
        supertonic2_m1: "M1.json"
        supertonic2_f1: "F1.json"
      default_total_step: 5
      default_speed: 1.05
      n_test: 1

  # ElevenLabs Configuration (adapter implemented)
  elevenlabs:
    enabled: false
    api_key: ${ELEVENLABS_API_KEY}
    base_url: "https://api.elevenlabs.io/v1"
    model: "eleven_monolingual_v1"

  # AllTalk Configuration (TODO: Implement adapter)
  alltalk:
    enabled: false
    api_url: "http://localhost:7851/api/tts"
    model: "xtts"

  # NeuTTS Air (Neuphonic) Configuration
  neutts:
    enabled: false  # Disabled by default; enable after installing assets
    # Backbone options:
    #  - "neuphonic/neutts-nano" (HF transformers)
    #  - "neuphonic/neutts-air" (HF transformers)
    #  - "neuphonic/neutts-*-q4-gguf" or "neuphonic/neutts-*-q8-gguf" (llama-cpp; enables streaming)
    backbone_repo: "neuphonic/neutts-nano"
    backbone_device: "cpu"  # or "gpu" if using llama-cpp with GPU layers
    # Codec options: "neuphonic/neucodec", "neuphonic/distill-neucodec", or "neuphonic/neucodec-onnx-decoder"
    codec_repo: "neuphonic/neucodec"
    codec_device: "cpu"
    sample_rate: 24000
    auto_download: false  # Default to offline-first; enable explicitly to allow downloads
    # Note: Use stored `custom:<voice_id>` voices by default. For ad-hoc cloning,
    # provide `voice_reference` (base64-encoded audio) and `extra_params.reference_text`.

  # IndexTTS2 Configuration
  index_tts:
    enabled: false  # Disabled by default (requires >10GB VRAM for best results)
    model_dir: "checkpoints/index_tts2"
    cfg_path: "checkpoints/index_tts2/config.yaml"
    device: "cuda"
    use_fp16: true
    use_cuda_kernel: true
    use_deepspeed: false
    sample_rate: 24000
    interval_silence: 200  # Silence in ms between segments
    max_text_tokens_per_segment: 120

  # Qwen3-TTS Configuration
  qwen3_tts:
    enabled: false  # Disabled by default (requires model download)
    runtime: "auto"
    model: "auto"
    model_path: null
    mlx_model: null
    capability_override: {}  # Remote runtime only; advertise hosted backend support truthfully
    tokenizer_model: "Qwen/Qwen3-TTS-Tokenizer-12Hz"
    device: "cpu"  # "cpu" | "cuda" | "mps"
    dtype: "float32"  # "float16" | "bfloat16" | "float32" (use float16/bfloat16 with cuda/mps)
    attn_implementation: "default"  # "flash_attention_2" | "default"
    auto_download: false
    max_concurrent_generations: 1
    stream_chunk_size_ms: 200
    auto_min_vram_gb: 12
    max_text_length: 5000
    tokenizer_max_audio_seconds: 300
    tokenizer_max_tokens: 20000
    tokenizer_max_payload_mb: 20
    voice_clone_prompt_max_kb: 256

# Voice mappings for cross-provider compatibility
# NOTE: Providers like index_tts rely on uploaded reference audio; the
#       "clone_required" placeholder indicates the caller must supply
#       `voice_reference` bytes rather than a built-in preset.
voice_mappings:
  # Generic voice names mapped to provider-specific voices
  generic:
    male:
      openai: "onyx"
      kokoro: "am_adam"
      higgs: "narrator"
      dia: "speaker1"
      chatterbox: "default"
      index_tts: "clone_required"
      pocket_tts: "clone_required"
      pocket_tts_cpp: "clone_required"
      lux_tts: "clone_required"
    female:
      openai: "nova"
      kokoro: "af_bella"
      higgs: "narrator"
      dia: "speaker2"
      chatterbox: "default"
      index_tts: "clone_required"
      pocket_tts: "clone_required"
      pocket_tts_cpp: "clone_required"
      lux_tts: "clone_required"
    neutral:
      openai: "alloy"
      kokoro: "af_sky"
      higgs: "conversational"
      dia: "narrator"
      chatterbox: "calm"
      index_tts: "clone_required"
      pocket_tts: "clone_required"
      pocket_tts_cpp: "clone_required"
      lux_tts: "clone_required"

  # Emotion-based voice selection
  emotions:
    happy:
      openai: "nova"
      kokoro: "af_sky"
      chatterbox: "energetic"
      index_tts: "clone_required"
      pocket_tts: "clone_required"
      pocket_tts_cpp: "clone_required"
      lux_tts: "clone_required"
    sad:
      openai: "shimmer"
      kokoro: "af_heart"
      chatterbox: "calm"
      index_tts: "clone_required"
      pocket_tts: "clone_required"
      pocket_tts_cpp: "clone_required"
      lux_tts: "clone_required"
    angry:
      openai: "onyx"
      kokoro: "am_michael"
      chatterbox: "default"
      index_tts: "clone_required"
      pocket_tts: "clone_required"
      pocket_tts_cpp: "clone_required"
      lux_tts: "clone_required"
    excited:
      openai: "fable"
      kokoro: "af_bella"
      chatterbox: "energetic"
      index_tts: "clone_required"
      pocket_tts: "clone_required"
      pocket_tts_cpp: "clone_required"
      lux_tts: "clone_required"

# Audio format preferences by provider
format_preferences:
  openai: ["mp3", "opus", "aac", "flac", "wav", "pcm"]
  kokoro: ["wav", "mp3", "opus", "flac", "pcm"]
  higgs: ["wav", "mp3", "opus", "flac", "pcm"]
  dia: ["wav", "mp3", "opus", "flac", "pcm"]
  chatterbox: ["wav", "mp3", "opus", "flac", "pcm"]
  vibevoice_realtime: ["pcm", "wav", "mp3", "opus", "flac"]
  neutts: ["wav", "mp3", "opus", "flac", "pcm"]
  index_tts: ["mp3", "wav"]
  pocket_tts: ["wav", "mp3", "opus", "flac", "pcm", "aac"]
  pocket_tts_cpp: ["wav", "mp3", "opus", "flac", "pcm", "aac"]
  lux_tts: ["wav", "mp3", "opus", "flac", "pcm", "aac"]
  qwen3_tts: ["wav", "mp3", "opus", "flac", "pcm"]

# Performance settings
performance:
  max_concurrent_generations: 4
  # When true, embed error messages as audio (compat); when false, use HTTP errors
  stream_errors_as_audio: false
  cache_enabled: false  # Future: Enable response caching
  cache_ttl_seconds: 3600
  stream_chunk_size: 1024
  # Retry adapter initialization after N seconds when it previously failed
  adapter_failure_retry_seconds: 300

# Fallback settings
fallback:
  enabled: true
  max_attempts: 3
  retry_delay_ms: 1000
  exclude_providers: []  # Providers to never use as fallback

# Logging settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_requests: true
  log_responses: false
  log_performance_metrics: true
