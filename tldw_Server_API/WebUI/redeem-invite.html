<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TLDW Server - Redeem Org Invite</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; max-width: 800px; }
    h1 { margin-bottom: 0.25rem; }
    .muted { color: #666; margin-top: 0; }
    form { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    label { display: block; margin: 0.5rem 0 0.25rem; }
    input[type="text"] { width: 100%; padding: 0.5rem; }
    button { margin-top: 0.75rem; padding: 0.5rem 0.9rem; cursor: pointer; }
    pre { background: #f7f7f7; padding: 0.75rem; border-radius: 6px; overflow: auto; }
    .ok { color: #107c10; }
    .err { color: #b00020; }
  </style>
  <script defer src="/webui/js/redeem-invite.js"></script>
</head>
<body>
  <h1>Redeem Organization Invite</h1>
  <p class="muted">Preview requires no login. Redeeming requires an access token in <code>localStorage</code> as <code>tldw_access_token</code>.</p>

  <form id="invite-preview-form">
    <label for="invite_code">Invite Code</label>
    <input type="text" id="invite_code" required />
    <button type="submit">Preview Invite</button>
    <pre id="preview_result"></pre>
  </form>

  <form id="invite-redeem-form">
    <button type="submit">Redeem Invite</button>
    <pre id="redeem_result"></pre>
  </form>
</body>
</html>
