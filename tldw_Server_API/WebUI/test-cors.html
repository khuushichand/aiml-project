<!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
</head>
<body>
    <h1>CORS Connection Test</h1>
    <p>This page tests the connection to the API server.</p>
    
    <button onclick="testHealth()">Test /health endpoint</button>
    <button onclick="testHealthWithToken()">Test /health with Token</button>
    <button onclick="testAPIDocs()">Test /docs endpoint</button>
    
    <h2>Results:</h2>
    <pre id="results"></pre>
    
    <script>
        const resultsEl = document.getElementById('results');
        
        function log(message) {
            resultsEl.textContent += message + '\n';
            console.log(message);
        }
        
        async function testHealth() {
            log('\n=== Testing /health endpoint (no auth) ===');
            try {
                const response = await fetch('http://localhost:8000/health', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                log(`Status: ${response.status} ${response.statusText}`);
                
                if (response.ok) {
                    const data = await response.json();
                    log(`Response: ${JSON.stringify(data)}`);
                    log('✅ SUCCESS - CORS is working!');
                } else {
                    log('❌ Failed - Response not OK');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`);
                log('This usually means CORS is blocking the request');
            }
        }
        
        async function testHealthWithToken() {
            log('\n=== Testing /health endpoint (with Token header) ===');
            try {
                const response = await fetch('http://localhost:8000/health', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Token': 'test-token'
                    }
                });
                
                log(`Status: ${response.status} ${response.statusText}`);
                
                if (response.ok) {
                    const data = await response.json();
                    log(`Response: ${JSON.stringify(data)}`);
                    log('✅ SUCCESS - CORS with Token header is working!');
                } else {
                    log('❌ Failed - Response not OK');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`);
                log('This usually means CORS is blocking the request with Token header');
            }
        }
        
        async function testAPIDocs() {
            log('\n=== Testing if API server is running ===');
            log('Try opening http://localhost:8000/docs in a new tab');
            log('If it works, the API is running but CORS might be misconfigured');
            window.open('http://localhost:8000/docs', '_blank');
        }
        
        // Auto-test on load
        window.onload = () => {
            log('Page loaded from: ' + window.location.href);
            log('Make sure you are accessing this via http://localhost:8081 or http://127.0.0.1:8081');
            log('');
            log('Click the buttons above to test the connection.');
        };
    </script>
</body>
</html>
