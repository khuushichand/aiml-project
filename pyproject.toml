###########################
# pyproject.toml for tldw_Server_API
###########################
[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"
###########################
# Project Info
###########################
[project.urls]
Homepage = "https://tldwproject.com"
Documentation = "https://docs.tldwproject.com"
Repository = "https://github.com/rmusser01/tldw_server"
#
[project]
name = "tldw"
version = "0.1.0"
description = "A naive attempt at 'A Young Lady's Illustrated Primer'."
requires-python = ">=3.9"
readme = "README.md"
license = { file = "LICENSE.txt" }
#
authors = [
  { name = "Robert Musser", email = "contact@tldwproject.com" }
]
###########################
# Dependencies
###########################
dependencies = [
  # API Server
  "aiofiles",
  "cachetools",
  "defusedxml",
  "fastapi",
  "httpx",
  "loguru",
  "lxml",
  "numpy",
  "pandas",
  "passlib",
  "psutil",
  "pydantic",
  "pydantic_core",
  "pytest",
  "python-dotenv",
  "python-json-logger",
  "python-magic",
  "python-multipart",
  "PyYAML",
  "redis",
  "scikit_learn",
  "scipy",
  "slowapi",
  "starlette",
  "toml",
  "tqdm",
  "uvicorn",
  # Security
  "keyring",
  "puremagic",
  "pycryptodomex",
  "PyJWT",
  "yara_python",
  # Audio/Video
  "faster_whisper",
  "pyannote.audio",
  "PyAudio",
  "sounddevice",
  "soundfile",
  "yt_dlp",
  # Chunking/Languages
  "chardet",
  "fugashi",
  "jieba",
  "langdetect",
  "nltk",
  "tiktoken",
  # Document Processing
  "beautifulsoup4",
  "docling",
  "docx2txt",
  "EbookLib",
  "html2text",
  "lxml_html_clean",
  "mwparserfromhell",
  "mwxml",
  "pymupdf",
  "pymupdf4llm",
  "pypandoc",
  "pypandoc_binary",
  "trafilatura",
  # LLM/ML
  "bert_score",
  "FlashRank",
  "openai",
  "rouge_score",
  "sentence_transformers",
  "textstat",
  "torch",
  "transformers",
  # Research/Web
  "arxiv",
  "playwright",
  "playwright_stealth",
  "Requests",
  "tenacity",
  "urllib3",
  # Vector DB
  "chromadb",
  # Other
  "datasets",
  "fire",
  "genanki",
  "gradio",
  "Jinja2",
  "joblib",
  "Pillow"
]

[project.optional-dependencies]
gradio = [
  "fastapi",
  "gradio"
]
media_wiki = [
  "mwparserfromhell",
  "mwxml"
]
web_research = [
  "arxiv",
  "genanki",
  "playwright",
  "trafilatura"
]
audio_recording_windows = [
  "PyAudioWPatch"
]
STT_All = [
  "nemo_toolkit[asr]",
  "cython"
]
STT_Parakeet = [
  "nemo_toolkit[asr]",
  "cython"
]
TTS_All = [
  "pydub"
]
TTS_kokoro = [
  "pydub",
  "phonemizer",
  "scipy",
  "munch"
]
TTS_kokoro_onnx = [
  "pydub",
  "onnxruntime",
  "kokoro-onnx"
]
TTS_sovits = [
  "pydub"
]
backend_onnx = [
  "onnxruntime"
]
backend_llama = [
  "scikit-learn>=0.24.0",
  "scipy>=1.6.0"
]
backend_vllm = [
  "scikit-learn>=0.24.0",
  "scipy>=1.6.0"
]
db_postgres = [
  "psycopg2-binary",
  "psycopg2"
]
db_opensearch = [
  "opensearch",
  "elasticsearch"
]
all = [
  "numpy>=1.20.0",
  "pandas>=1.2.0",
  "matplotlib>=3.4.0",
  "seaborn>=0.11.0",
  "scikit-learn>=0.24.0",
  "scipy>=1.6.0"
]
###########################
# Tools
###########################
[tool.setuptools.packages.find]
where = ["tldw_Server_API"]
###########################
# Tools - Tests
###########################
[tool.pytest.ini_options]
filterwarnings = [
    "ignore::DeprecationWarning:pkg_resources:",
    "ignore::DeprecationWarning:pyannote.core.notebook:",
    "ignore::DeprecationWarning:speechbrain.pretrained:"
]
markers = [
    "unit: marks tests as unit tests",
    "integration: marks tests as integration tests",
    "external_api: marks tests that require external API access",
    "local_llm_service: marks tests that require local LLM service",
    "timeout: marks tests with custom timeout settings", 
    "benchmark: marks performance benchmark tests"
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"