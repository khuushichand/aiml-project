name: Postgres Evaluations Tests

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  pg-evaluations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tldw_user
          POSTGRES_PASSWORD: TestPassword123!
          POSTGRES_DB: tldw_content
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U tldw_user -d tldw_content" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest psycopg[binary] loguru pydantic fastapi starlette aiosqlite

      - name: Wait for Postgres readiness
        run: |
          python - <<'PY'
          import time
          import psycopg
          dsn = "host=localhost port=5432 dbname=tldw_content user=tldw_user password=TestPassword123! connect_timeout=3"
          for i in range(60):
              try:
                  with psycopg.connect(dsn) as conn:
                      with conn.cursor() as cur:
                          cur.execute("SELECT 1")
                          break
              except Exception as e:
                  print("Waiting for Postgres...", e)
                  time.sleep(1)
          else:
              raise SystemExit("Postgres did not become ready in time")
          PY

      - name: Run Evaluations Postgres tests
        env:
          POSTGRES_TEST_HOST: localhost
          POSTGRES_TEST_PORT: '5432'
          POSTGRES_TEST_DATABASE: tldw_content
          POSTGRES_TEST_USER: tldw_user
          POSTGRES_TEST_PASSWORD: TestPassword123!
        run: |
          pytest -q \
            tldw_Server_API/tests/Evaluations/test_evaluations_backend_dual.py \
            tldw_Server_API/tests/Evaluations/test_evaluations_postgres_crud.py \
            tldw_Server_API/tests/Evaluations/test_evaluations_migration_cli.py

      - name: Run Media Postgres smoke tests
        if: ${{ always() }}
        env:
          POSTGRES_TEST_HOST: localhost
          POSTGRES_TEST_PORT: '5432'
          POSTGRES_TEST_DATABASE: tldw_content
          POSTGRES_TEST_USER: tldw_user
          POSTGRES_TEST_PASSWORD: TestPassword123!
        run: |
          # Run light Media Postgres tests that don't require heavy deps
          pytest -q \
            tldw_Server_API/tests/DB_Management/test_media_postgres_support.py \
            tldw_Server_API/tests/DB_Management/test_media_postgres_migrations.py \
            tldw_Server_API/tests/DB_Management/test_media_transcripts_upsert.py
