---
name: Python tldw CI/CD
on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Job 1: Code Quality Checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            uv.lock
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install email-validator
          pip install -e ".[dev]"

      - name: Run Black formatter check (non-blocking)
        run: |
          set +e
          black --check --diff tldw_Server_API/ || true
          set -e

      - name: Run Ruff linter (non-blocking)
        run: |
          set +e
          ruff check tldw_Server_API/ || true
          set -e

      - name: Run MyPy type checker
        run: |
          mypy tldw_Server_API/ || true  # Allow failures for now
          
      - name: Security check with pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc || true  # Allow failures for now

      - name: Security check with Bandit (non-blocking)
        run: |
          pip install bandit
          bandit -r tldw_Server_API -x tldw_Server_API/tests -lll || true

  # Job 2: Unit Tests
  unit-tests:
    name: Unit Tests - ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          # Exclude Python 3.13 on Windows if issues arise
          - os: windows-latest
            python-version: "3.13"
    
    env:
      PYTHONPATH: ./tldw_Server_API
      # Set minimal API keys for unit tests
      OPENAI_API_KEY: "test-key"
      ANTHROPIC_API_KEY: "test-key"
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            uv.lock
            
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-all-dev ffmpeg
          
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install portaudio ffmpeg
          
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg -y
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install email-validator
          pip install pytest-xdist  # Install test parallelization
          pip install -e ".[dev]"
          # Install platform-specific dependencies
          if [ "${{ runner.os }}" = "Windows" ]; then
            pip install -e ".[audio_recording_windows]"
          fi
        shell: bash
          
      - name: Run unit tests with coverage
        run: |
          # Use parallel test execution with pytest-xdist
          # -n auto uses all available CPU cores, adjust as needed
          pytest -v -m "unit" -n auto --cov=tldw_Server_API --cov-report=xml --cov-report=html --cov-report=term-missing --junit-xml=test-results-${{ matrix.os }}-${{ matrix.python-version }}.xml --timeout=300
        shell: bash
        continue-on-error: true
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            test-results-*.xml
            htmlcov/
            
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-unit-tests
          fail_ci_if_error: false  # Don't fail if codecov is down
          
      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          # Extract coverage percentage from the XML report
          coverage_percent=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); print(float(root.attrib.get('line-rate', '0')) * 100)" 2>/dev/null || echo "0")
          echo "Current coverage: ${coverage_percent}%"
          
          # Set minimum coverage threshold (adjust as needed)
          MIN_COVERAGE=50
          
          if (( $(echo "$coverage_percent < $MIN_COVERAGE" | bc -l 2>/dev/null || echo 1) )); then
            echo "⚠️ Coverage ${coverage_percent}% is below minimum threshold of ${MIN_COVERAGE}%"
            # Don't fail the build for now, just warn
            # exit 1
          else
            echo "✅ Coverage ${coverage_percent}% meets minimum threshold of ${MIN_COVERAGE}%"
          fi
        shell: bash
        continue-on-error: true

  # Job 3: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      PYTHONPATH: ./tldw_Server_API
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            uv.lock
            
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-all-dev ffmpeg
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install email-validator
          pip install pytest-xdist  # Install test parallelization
          pip install -e ".[dev]"
          
      - name: Run integration tests
        run: |
          # Use parallel test execution for integration tests too
          pytest -v -m "integration" -n auto --cov=tldw_Server_API --cov-report=xml --junit-xml=test-results-integration.xml --timeout=600
        shell: bash
        continue-on-error: true
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: test-results-*.xml

  postgres-tests:
    name: PostgreSQL Backend Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tldw
          POSTGRES_PASSWORD: tldw
          POSTGRES_DB: tldw_content
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tldw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: ./tldw_Server_API
      POSTGRES_TEST_HOST: localhost
      POSTGRES_TEST_PORT: ${{ job.services.postgres.ports[5432] }}
      POSTGRES_TEST_DB: tldw_content
      POSTGRES_TEST_USER: tldw
      POSTGRES_TEST_PASSWORD: tldw
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install email-validator
          pip install pytest-xdist
          pip install -e ".[dev]"

      - name: Run PostgreSQL-backed tests
        run: |
          pytest -v -n auto \
            tldw_Server_API/tests/DB_Management/test_media_postgres_support.py \
            tldw_Server_API/tests/DB_Management/test_media_postgres_migrations.py \
            tldw_Server_API/tests/RAG/test_analytics_backend.py \
            tldw_Server_API/tests/RAG/test_dual_backend_rag_flow.py \
            tldw_Server_API/tests/RAG/test_dual_backend_end_to_end.py \
            tldw_Server_API/tests/DB_Management/test_migration_tools.py \
            tldw_Server_API/tests/DB_Management/test_migration_cli_integration.py \
            --junit-xml=postgres-tests.xml

      - name: Upload postgres test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-postgres
          path: postgres-tests.xml

  # Job 4: External API Tests (only on main branch or manual trigger)
  external-api-tests:
    name: External API Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      PYTHONPATH: ./tldw_Server_API
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            uv.lock
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-all-dev ffmpeg
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install email-validator
          pip install pytest-xdist  # Install test parallelization
          pip install -e ".[dev]"
          
      - name: Run external API tests
        run: |
          pytest -v -m "external_api" --junit-xml=test-results-external.xml --timeout=1200
        shell: bash
        continue-on-error: true
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-external-api
          path: test-results-*.xml

  # Job 5: Server Startup Test
  server-test:
    name: Server Startup Test
    runs-on: ubuntu-latest
    needs: [unit-tests, code-quality]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            uv.lock
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-all-dev ffmpeg
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install email-validator
          pip install -e "."
          
      - name: Test server startup
        run: |
          # Start the server in the background
          uvicorn tldw_Server_API.app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          
          # Wait for server to start with retries
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/docs 2>/dev/null; then
              echo "Server is running!"
              # Kill the server
              kill $SERVER_PID || true
              exit 0
            fi
            echo "Attempt $i: Server not ready yet, waiting..."
            sleep 2
          done
          
          echo "Server failed to start after 60 seconds"
          kill $SERVER_PID || true
          exit 1

  # Job 6: Build and Publish (only on main branch)
  build-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-quality, server-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          
      - name: Build distribution
        run: |
          python -m build
          
      - name: Check distribution
        run: |
          twine check dist/*
          
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # Job 7: Docker Build and Test
  docker-test:
    name: Docker Build and Test
    runs-on: ubuntu-latest
    needs: [unit-tests, code-quality]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        run: |
          # Find available Dockerfile
          if [ -f "tldw_Server_API/Dockerfiles/Dockerfile" ]; then
            DOCKERFILE="tldw_Server_API/Dockerfiles/Dockerfile"
          elif [ -f "Dockerfile" ]; then
            DOCKERFILE="Dockerfile"
          else
            echo "No Dockerfile found, skipping Docker build"
            exit 0
          fi
          
          echo "Building Docker image using $DOCKERFILE"
          docker build -f $DOCKERFILE -t tldw-server:test .
          
      - name: Test Docker container startup
        run: |
          # Start container and check if it runs
          docker run -d --name tldw-test -p 8000:8000 tldw-server:test || exit 0
          
          # Wait for container to be healthy
          for i in {1..30}; do
            if docker ps | grep -q tldw-test; then
              echo "Container is running"
              
              # Try to access the API
              if curl -f http://localhost:8000/docs 2>/dev/null; then
                echo "✅ Docker container is running and API is accessible"
                docker stop tldw-test
                docker rm tldw-test
                exit 0
              fi
            fi
            echo "Waiting for container to start... (attempt $i/30)"
            sleep 2
          done
          
          echo "Container failed to start properly"
          docker logs tldw-test || true
          docker stop tldw-test || true
          docker rm tldw-test || true
        continue-on-error: true

  # Job 8: Performance Benchmarking
  performance-benchmark:
    name: Performance Benchmarking
    runs-on: ubuntu-latest
    needs: [unit-tests, code-quality]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'workflow_dispatch'
    env:
      PYTHONPATH: ./tldw_Server_API
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      # Pip cache handled by setup-python above
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install email-validator
          pip install pytest-benchmark
          pip install -e ".[dev]"
          
      - name: Run benchmark tests
        run: |
          # Run performance/benchmark tests if they exist
          pytest -v -m "benchmark or performance" --benchmark-only --benchmark-json=benchmark.json --timeout=1200 || echo "No benchmark tests found"
        continue-on-error: true
        
      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        if: github.ref == 'refs/heads/main'
        with:
          tool: 'pytest'
          output-file-path: benchmark.json
          benchmark-data-dir-path: 'dev/bench'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '120%'  # Alert if performance degrades by >20%
          comment-on-alert: true
          alert-comment-cc-users: '@rmusser01'
        continue-on-error: true
        
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark.json

  # Job 9: Test Report Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-quality]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true
          
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results-*.xml
          check_name: Test Results Summary
          comment_mode: always
          
      - name: Create test badge
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Test results processed"
          # Here you could update a badge in README or create a gist
