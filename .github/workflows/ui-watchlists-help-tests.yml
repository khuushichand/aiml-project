name: UI Watchlists Help Tests

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "apps/packages/ui/src/components/Option/Watchlists/WatchlistsPlaygroundPage.tsx"
      - "apps/packages/ui/src/components/Option/Watchlists/__tests__/WatchlistsPlaygroundPage.help-links.test.tsx"
      - "apps/packages/ui/src/components/Option/Watchlists/shared/help-docs.ts"
      - "apps/packages/ui/src/components/Option/Watchlists/shared/__tests__/help-docs.test.ts"
      - "apps/packages/ui/src/assets/locale/en/watchlists.json"
      - "apps/packages/ui/src/public/_locales/en/watchlists.json"
      - "apps/packages/ui/package.json"
      - "apps/packages/ui/vitest.config.ts"
      - "apps/bun.lock"
      - ".github/workflows/ui-watchlists-help-tests.yml"
  push:
    branches:
      - main
    paths:
      - "apps/packages/ui/src/components/Option/Watchlists/WatchlistsPlaygroundPage.tsx"
      - "apps/packages/ui/src/components/Option/Watchlists/__tests__/WatchlistsPlaygroundPage.help-links.test.tsx"
      - "apps/packages/ui/src/components/Option/Watchlists/shared/help-docs.ts"
      - "apps/packages/ui/src/components/Option/Watchlists/shared/__tests__/help-docs.test.ts"
      - "apps/packages/ui/src/assets/locale/en/watchlists.json"
      - "apps/packages/ui/src/public/_locales/en/watchlists.json"
      - "apps/packages/ui/package.json"
      - "apps/packages/ui/vitest.config.ts"
      - "apps/bun.lock"
      - ".github/workflows/ui-watchlists-help-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-watchlists-help-tests-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  watchlists-help-vitest:
    name: Watchlists Help Vitest (Serial)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install workspace dependencies
        working-directory: apps
        run: bun install --frozen-lockfile

      - name: Run Watchlists help documentation tests
        working-directory: apps/packages/ui
        env:
          CI: "true"
        run: bun run test:watchlists:help
