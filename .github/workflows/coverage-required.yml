name: coverage-required

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-required-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Gate Changes
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      e2e_changed: ${{ steps.detect.outputs.e2e_changed }}
      security_relevant_changed: ${{ steps.detect.outputs.security_relevant_changed }}
      coverage_required: ${{ steps.detect.outputs.coverage_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0
      - id: detect
        name: Classify changed files
        uses: ./.github/actions/detect-required-gate-changes

  coverage-required:
    name: coverage-required
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 30
    steps:
      - name: No-op pass (coverage not required)
        if: needs.changes.outputs.coverage_required != 'true'
        run: echo "No backend paths changed; coverage-required passed by policy."

      - name: Checkout
        if: needs.changes.outputs.coverage_required == 'true'
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Install FFmpeg and PortAudio (Linux)
        if: needs.changes.outputs.coverage_required == 'true'
        uses: ./.github/actions/setup-ffmpeg
        with:
          install-portaudio: 'true'

      - name: Setup Python and dependencies
        if: needs.changes.outputs.coverage_required == 'true'
        uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.12"
          use-uv: "true"
          cache-dependency-path: |
            pyproject.toml
            uv.lock
          extras: dev,multiplayer

      - name: Run global coverage floor
        if: needs.changes.outputs.coverage_required == 'true'
        env:
          PYTHONPATH: .
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          TEST_MODE: "true"
          DISABLE_HEAVY_STARTUP: "1"
        run: |
          pytest -q --maxfail=1 --disable-warnings -p pytest_cov -p pytest_asyncio.plugin \
            -m "not jobs and not e2e" \
            tldw_Server_API/tests/unit tldw_Server_API/tests/sanity_tests \
            --cov=tldw_Server_API --cov-report=xml --cov-report=term-missing --cov-fail-under=5
