name: Workflows Suite

on:
  push:
    branches: [ main, master ]
    paths:
      - 'tldw_Server_API/**'
      - '.github/workflows/workflows-tests.yml'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'tldw_Server_API/**'
      - '.github/workflows/workflows-tests.yml'

jobs:
  # Linux + Postgres service (full suite including PG tests)
  workflows-tests-linux-pg:
    name: Workflows (Ubuntu + Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    services:
      postgres:
        image: postgres:18-bookworm
        env:
          POSTGRES_USER: tldw_user
          POSTGRES_PASSWORD: TestPassword123!
          POSTGRES_DB: tldw_users
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tldw_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_TEST_HOST: 127.0.0.1
      POSTGRES_TEST_PORT: 5432
      POSTGRES_TEST_DB: tldw_users
      POSTGRES_TEST_USER: tldw_user
      POSTGRES_TEST_PASSWORD: TestPassword123!
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
        python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install system deps (ffmpeg, portaudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg portaudio19-dev
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install "psycopg[binary]>=3.1" pytest-asyncio
          python -m pip install -r tldw_Server_API/requirements.txt
      - name: Run test suite (Linux + PG)
        run: |
          pytest -q --maxfail=1 --disable-warnings
      - name: Coverage report
        run: |
          pytest --cov=tldw_Server_API --cov-report=xml -q
      - name: Enforce coverage threshold (Linux + PG)
        env:
          CI_STRICT_COVERAGE: ${{ env.CI_STRICT_COVERAGE }}
        run: |
          python - << 'PY'
import xml.etree.ElementTree as ET
try:
    tree = ET.parse('coverage.xml')
    pct = float(tree.getroot().attrib.get('line-rate','0')) * 100.0
except Exception:
    pct = 0.0
print(f"Coverage: {pct:.2f}%")
MIN_COVERAGE = float('${{ env.MIN_COVERAGE || 50 }}')
if pct < MIN_COVERAGE:
    strict = '${{ env.CI_STRICT_COVERAGE || '0' }}'
    msg = f"coverage {pct:.2f}% < threshold {MIN_COVERAGE}%"
    if strict in ('1','true','yes','on'):
        raise SystemExit(msg)
    else:
        print('Warning: ' + msg)
PY
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-linux-pg-${{ matrix.python-version }}
          path: coverage.xml

  # Cross-OS matrix (SQLite path; PG tests are skipped if driver/env missing)
  workflows-tests-os-matrix:
    name: Workflows (OS Matrix)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg || true
      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r tldw_Server_API/requirements.txt
      - name: Run full test suite (SQLite only)
        run: pytest -q --maxfail=1 --disable-warnings
