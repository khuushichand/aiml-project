name: Workflows Suite (Docker + Postgres)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'tldw_Server_API/**'
      - '.github/workflows/workflows-tests.yml'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'tldw_Server_API/**'
      - '.github/workflows/workflows-tests.yml'

jobs:
  workflows-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tldw_user
          POSTGRES_PASSWORD: TestPassword123!
          POSTGRES_DB: tldw_users
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tldw_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Wire tests to Postgres service
      POSTGRES_TEST_HOST: 127.0.0.1
      POSTGRES_TEST_PORT: 5432
      POSTGRES_TEST_DB: tldw_users
      POSTGRES_TEST_USER: tldw_user
      POSTGRES_TEST_PASSWORD: TestPassword123!
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system deps (ffmpeg, portaudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg portaudio19-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          # Prefer binary psycopg to avoid compiling libpq
          python -m pip install "psycopg[binary]>=3.1" "pytest-asyncio>=0.23.0"
          # Install project dependencies (cache speeds later matrix jobs)
          python -m pip install -r tldw_Server_API/requirements.txt

      - name: Run full test suite (SQLite + Postgres)
        run: |
          python -m pytest -q
