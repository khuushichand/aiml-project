name: E2E Smoke Workflows

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'tldw_Server_API/**'
      - '.github/workflows/e2e-smoke.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'tldw_Server_API/**'
      - '.github/workflows/e2e-smoke.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: E2E Smoke - ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      PYTHONPATH: ./tldw_Server_API
      TEST_MODE: "true"
      DISABLE_HEAVY_STARTUP: "1"
      E2E_TEST_BASE_URL: "http://127.0.0.1:8000"
      MCP_JWT_SECRET: test_secret_key_for_ci_only_32_chars_minimum
      MCP_API_KEY_SALT: test_salt_key_for_ci_only_32_chars_minimum
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-all-dev ffmpeg

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install portaudio ffmpeg

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tldw_Server_API/requirements.txt
          python -m pip install websockets pytest-timeout pytest-xdist
        shell: bash

      - name: Start server (single-user)
        env:
          SERVER_LABEL: single
          AUTH_MODE: single_user
          SINGLE_USER_API_KEY: "test-api-key-12345"
        shell: bash
        run: |
          python - <<'PY'
          import os, subprocess, sys, pathlib
          label = os.environ.get("SERVER_LABEL", "server")
          pid_path = pathlib.Path(f"server-{label}.pid")
          log_path = pathlib.Path(f"server-{label}.log")
          env = os.environ.copy()
          cmd = [
              sys.executable,
              "-m",
              "uvicorn",
              "tldw_Server_API.app.main:app",
              "--host",
              "127.0.0.1",
              "--port",
              os.environ.get("SERVER_PORT", "8000"),
          ]
          with log_path.open("w", encoding="utf-8") as log_file:
              proc = subprocess.Popen(cmd, env=env, stdout=log_file, stderr=log_file)
          pid_path.write_text(str(proc.pid), encoding="utf-8")
          PY

      - name: Wait for API health (single-user)
        env:
          SERVER_LABEL: single
        shell: bash
        run: |
          python - <<'PY'
          import os, sys, time, urllib.request, pathlib
          label = os.environ.get("SERVER_LABEL", "server")
          base_url = os.environ.get("E2E_TEST_BASE_URL", "http://127.0.0.1:8000")
          url = base_url.rstrip("/") + "/api/v1/health"
          for attempt in range(60):
              try:
                  with urllib.request.urlopen(url, timeout=2) as resp:
                      if resp.status == 200:
                          break
              except Exception:
                  time.sleep(2)
          else:
              log_path = pathlib.Path(f"server-{label}.log")
              if log_path.exists():
                  print("===== server log tail (single-user) =====")
                  print(log_path.read_text(encoding="utf-8")[-4000:], flush=True)
              sys.exit("Server failed to become healthy in time")
          PY

      - name: Run E2E tests (single-user)
        env:
          AUTH_MODE: single_user
          SINGLE_USER_API_KEY: "test-api-key-12345"
        shell: bash
        run: |
          pytest -v -n 1 -m "critical and not multi_user" --timeout=600 \
            tldw_Server_API/tests/e2e/test_tts_stream_http.py \
            tldw_Server_API/tests/e2e/test_prompt_studio_e2e.py \
            tldw_Server_API/tests/e2e/test_rag_deep_checks.py \
            tldw_Server_API/tests/e2e/test_mcp_basic.py \
            tldw_Server_API/tests/e2e/test_rate_limits.py \
            tldw_Server_API/tests/e2e/test_concurrency_jobs.py

      - name: Stop server (single-user)
        if: always()
        env:
          SERVER_LABEL: single
        shell: bash
        run: |
          python - <<'PY'
          import os, signal, pathlib, time, sys
          label = os.environ.get("SERVER_LABEL", "server")
          pid_path = pathlib.Path(f"server-{label}.pid")
          if not pid_path.exists():
              sys.exit(0)
          try:
              pid = int(pid_path.read_text(encoding="utf-8").strip())
          except Exception:
              sys.exit(0)
          try:
              os.kill(pid, signal.SIGTERM)
          except OSError:
              sys.exit(0)
          for _ in range(30):
              try:
                  os.kill(pid, 0)
              except OSError:
                  pid_path.unlink(missing_ok=True)
                  sys.exit(0)
              time.sleep(1)
          try:
              kill_signal = getattr(signal, "SIGKILL", signal.SIGTERM)
              os.kill(pid, kill_signal)
          except OSError:
              pass
          pid_path.unlink(missing_ok=True)
          PY

      - name: Print server log (single-user)
        if: failure()
        env:
          SERVER_LABEL: single
        shell: bash
        run: |
          python - <<'PY'
          import pathlib, os
          label = os.environ.get("SERVER_LABEL", "server")
          log_path = pathlib.Path(f"server-{label}.log")
          if log_path.exists():
              print("===== server log (single-user) =====")
              print(log_path.read_text(encoding="utf-8"))
          PY

      - name: Start server (multi-user)
        env:
          SERVER_LABEL: multi
          AUTH_MODE: multi_user
        shell: bash
        run: |
          python - <<'PY'
          import os, subprocess, sys, pathlib
          label = os.environ.get("SERVER_LABEL", "server")
          pid_path = pathlib.Path(f"server-{label}.pid")
          log_path = pathlib.Path(f"server-{label}.log")
          env = os.environ.copy()
          cmd = [
              sys.executable,
              "-m",
              "uvicorn",
              "tldw_Server_API.app.main:app",
              "--host",
              "127.0.0.1",
              "--port",
              os.environ.get("SERVER_PORT", "8000"),
          ]
          with log_path.open("w", encoding="utf-8") as log_file:
              proc = subprocess.Popen(cmd, env=env, stdout=log_file, stderr=log_file)
          pid_path.write_text(str(proc.pid), encoding="utf-8")
          PY

      - name: Wait for API health (multi-user)
        env:
          SERVER_LABEL: multi
        shell: bash
        run: |
          python - <<'PY'
          import os, sys, time, urllib.request, pathlib
          label = os.environ.get("SERVER_LABEL", "server")
          base_url = os.environ.get("E2E_TEST_BASE_URL", "http://127.0.0.1:8000")
          url = base_url.rstrip("/") + "/api/v1/health"
          for attempt in range(60):
              try:
                  with urllib.request.urlopen(url, timeout=2) as resp:
                      if resp.status == 200:
                          break
              except Exception:
                  time.sleep(2)
          else:
              log_path = pathlib.Path(f"server-{label}.log")
              if log_path.exists():
                  print("===== server log tail (multi-user) =====")
                  print(log_path.read_text(encoding="utf-8")[-4000:], flush=True)
              sys.exit("Server failed to become healthy in time")
          PY

      - name: Run E2E tests (multi-user)
        env:
          AUTH_MODE: multi_user
        shell: bash
        run: |
          pytest -v -n 1 -m "multi_user" --timeout=600 \
            tldw_Server_API/tests/e2e/test_multi_user_onboarding.py

      - name: Stop server (multi-user)
        if: always()
        env:
          SERVER_LABEL: multi
        shell: bash
        run: |
          python - <<'PY'
          import os, signal, pathlib, time, sys
          label = os.environ.get("SERVER_LABEL", "server")
          pid_path = pathlib.Path(f"server-{label}.pid")
          if not pid_path.exists():
              sys.exit(0)
          try:
              pid = int(pid_path.read_text(encoding="utf-8").strip())
          except Exception:
              sys.exit(0)
          try:
              os.kill(pid, signal.SIGTERM)
          except OSError:
              sys.exit(0)
          for _ in range(30):
              try:
                  os.kill(pid, 0)
              except OSError:
                  pid_path.unlink(missing_ok=True)
                  sys.exit(0)
              time.sleep(1)
          try:
              kill_signal = getattr(signal, "SIGKILL", signal.SIGTERM)
              os.kill(pid, kill_signal)
          except OSError:
              pass
          pid_path.unlink(missing_ok=True)
          PY

      - name: Print server log (multi-user)
        if: failure()
        env:
          SERVER_LABEL: multi
        shell: bash
        run: |
          python - <<'PY'
          import pathlib, os
          label = os.environ.get("SERVER_LABEL", "server")
          log_path = pathlib.Path(f"server-{label}.log")
          if log_path.exists():
              print("===== server log (multi-user) =====")
              print(log_path.read_text(encoding="utf-8"))
          PY
