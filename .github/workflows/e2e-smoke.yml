name: E2E Critical Smoke (In-Process)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: e2e-smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    env:
      # In-process e2e configuration
      E2E_INPROCESS: "1"
      AUTH_MODE: single_user
      TEST_MODE: "1"
      SINGLE_USER_API_KEY: test-api-key-for-e2e-testing-12345
      SINGLE_USER_TEST_API_KEY: test-api-key-for-e2e-testing-12345
      # Avoid matplotlib cache permission issues during imports
      MPLCONFIGDIR: ${{ runner.temp }}/mpl
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Prepare cache dirs
        run: |
          mkdir -p "$MPLCONFIGDIR"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          # Install project with dev extras for pytest and tooling
          pip install -e .[dev]

      - name: Run critical e2e smoke tests (in-process)
        run: |
          python -m pytest tldw_Server_API/tests/e2e/ --critical-only -q

