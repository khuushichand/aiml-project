name: MCP Unified Tests

on:
  pull_request:
    paths:
      - 'tldw_Server_API/app/core/MCP_unified/**'
      - 'tldw_Server_API/app/api/v1/endpoints/mcp*'
      - '.github/workflows/mcp-unified-tests.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'tldw_Server_API/app/core/MCP_unified/**'
      - 'tldw_Server_API/app/api/v1/endpoints/mcp*'

permissions:
  contents: read

jobs:
  mcp-unit:
    name: MCP Unit - ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
    env:
      PYTHONUNBUFFERED: '1'
      TEST_MODE: 'true'
      DISABLE_HEAVY_STARTUP: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python and deps (with uv)
        uses: ./.github/actions/setup-python-deps
        with:
          python-version: ${{ matrix.python-version }}
          use-uv: 'true'
          cache-dependency-path: |
            pyproject.toml
            uv.lock
      - name: Run MCP unit tests (core)
        run: |
          pytest -q -m "unit" --junit-xml=mcp-unit-${{ matrix.os }}-${{ matrix.python-version }}.xml tldw_Server_API/app/core/MCP_unified/tests
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-tests-${{ matrix.os }}-${{ matrix.python-version }}
          path: mcp-unit-*.xml
      - name: Publish MCP unit results
        if: always()
        permissions:
          checks: write
          pull-requests: write
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: mcp-unit-*.xml
