name: UI Watchlists Extension E2E

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "apps/extension/tests/e2e/watchlists.spec.ts"
      - "apps/extension/tests/e2e/utils/**"
      - "apps/extension/package.json"
      - "apps/extension/playwright.config.ts"
      - "apps/packages/ui/src/components/Option/Watchlists/**"
      - "apps/packages/ui/src/services/watchlists.ts"
      - "apps/packages/ui/src/types/watchlists.ts"
      - "apps/bun.lock"
      - ".github/workflows/ui-watchlists-extension-e2e.yml"
  push:
    branches:
      - main
    paths:
      - "apps/extension/tests/e2e/watchlists.spec.ts"
      - "apps/extension/tests/e2e/utils/**"
      - "apps/extension/package.json"
      - "apps/extension/playwright.config.ts"
      - "apps/packages/ui/src/components/Option/Watchlists/**"
      - "apps/packages/ui/src/services/watchlists.ts"
      - "apps/packages/ui/src/types/watchlists.ts"
      - "apps/bun.lock"
      - ".github/workflows/ui-watchlists-extension-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-watchlists-extension-e2e-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  watchlists-extension-e2e:
    name: Watchlists Extension E2E (No Skips)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: .
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      TEST_MODE: "true"
      DISABLE_HEAVY_STARTUP: "1"
      MINIMAL_TEST_APP: "1"
      PRIVILEGE_METADATA_VALIDATE_ON_STARTUP: "0"
      AUTH_MODE: single_user
      SINGLE_USER_API_KEY: watchlists-e2e-key-12345
      SERVER_LABEL: watchlists-extension-e2e
      TLDW_E2E_SERVER_URL: http://127.0.0.1:8000
      TLDW_E2E_API_KEY: watchlists-e2e-key-12345

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install workspace dependencies
        working-directory: apps
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/extension
        run: bunx playwright install --with-deps chromium

      - name: Setup Python and server dependencies
        uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.12"
          use-uv: "true"
          cache-dependency-path: |
            pyproject.toml
            uv.lock
          extras: dev

      - name: Start backend server (single-user)
        shell: bash
        run: |
          python tldw_Server_API/tests/scripts/server_lifecycle.py start

      - name: Backend health check
        if: always()
        shell: bash
        run: |
          python tldw_Server_API/tests/scripts/server_lifecycle.py health-check

      - name: Run Watchlists extension Playwright spec (strict no-skip gate)
        working-directory: apps/extension
        run: |
          bun run test:e2e:watchlists:strict

      - name: Upload watchlists e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchlists-extension-e2e-artifacts
          if-no-files-found: ignore
          path: |
            apps/extension/test-results/**
            apps/extension/playwright-report/**

      - name: Print backend server log on failure
        if: failure()
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib

          label = os.environ.get("SERVER_LABEL", "watchlists-extension-e2e")
          log_path = pathlib.Path(f"server-{label}.log")
          if log_path.exists():
              print("===== backend server log =====")
              print(log_path.read_text(encoding="utf-8"))
          PY

      - name: Stop backend server
        if: always()
        shell: bash
        run: |
          python tldw_Server_API/tests/scripts/server_lifecycle.py stop || true
