name: frontend-required

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-required-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Gate Changes
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      tldw_frontend_changed: ${{ steps.detect.outputs.tldw_frontend_changed }}
      admin_ui_changed: ${{ steps.detect.outputs.admin_ui_changed }}
      e2e_changed: ${{ steps.detect.outputs.e2e_changed }}
      security_relevant_changed: ${{ steps.detect.outputs.security_relevant_changed }}
      coverage_required: ${{ steps.detect.outputs.coverage_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0
      - id: detect
        name: Classify changed files
        uses: ./.github/actions/detect-required-gate-changes

  frontend-required:
    name: frontend-required
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 25
    steps:
      - name: No-op pass (frontend unchanged)
        if: needs.changes.outputs.frontend_changed != 'true'
        run: echo "No frontend paths changed; frontend-required passed by policy."

      - name: Checkout
        if: needs.changes.outputs.frontend_changed == 'true'
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Setup Node.js
        if: needs.changes.outputs.frontend_changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Bun
        if: needs.changes.outputs.frontend_changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install frontend dependencies
        if: needs.changes.outputs.tldw_frontend_changed == 'true'
        working-directory: apps
        run: bun install

      - name: Run frontend lint
        if: needs.changes.outputs.tldw_frontend_changed == 'true'
        working-directory: apps/tldw-frontend
        run: bun run lint

      - name: Run frontend unit tests
        if: needs.changes.outputs.tldw_frontend_changed == 'true'
        working-directory: apps/tldw-frontend
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ -z "${BASE_SHA:-}" || "${BASE_SHA:-}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi

          if [[ -n "${BASE_SHA:-}" ]]; then
            echo "Running changed-only frontend unit tests from base SHA ${BASE_SHA}"
            bunx vitest run --changed="${BASE_SHA}"
          else
            echo "No base SHA found; running full frontend unit suite."
            bun run test:run
          fi

      - name: Install admin-ui dependencies
        if: needs.changes.outputs.admin_ui_changed == 'true'
        working-directory: admin-ui
        run: bun install

      - name: Run admin-ui lint
        if: needs.changes.outputs.admin_ui_changed == 'true'
        working-directory: admin-ui
        run: bun run lint

      - name: Run admin-ui unit tests
        if: needs.changes.outputs.admin_ui_changed == 'true'
        working-directory: admin-ui
        run: bun run test

      - name: Run admin-ui build
        if: needs.changes.outputs.admin_ui_changed == 'true'
        working-directory: admin-ui
        run: bun run build
