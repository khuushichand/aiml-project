name: frontend-required

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-required-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Gate Changes
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      e2e_changed: ${{ steps.detect.outputs.e2e_changed }}
      security_relevant_changed: ${{ steps.detect.outputs.security_relevant_changed }}
      coverage_required: ${{ steps.detect.outputs.coverage_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0
      - id: detect
        name: Classify changed files
        uses: ./.github/actions/detect-required-gate-changes

  frontend-required:
    name: frontend-required
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 25
    steps:
      - name: No-op pass (frontend unchanged)
        if: needs.changes.outputs.frontend_changed != 'true'
        run: echo "No frontend paths changed; frontend-required passed by policy."

      - name: Checkout
        if: needs.changes.outputs.frontend_changed == 'true'
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Setup Node.js
        if: needs.changes.outputs.frontend_changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/tldw-frontend/package-lock.json

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend_changed == 'true'
        working-directory: apps/tldw-frontend
        run: npm ci

      - name: Run frontend lint
        if: needs.changes.outputs.frontend_changed == 'true'
        working-directory: apps/tldw-frontend
        run: npm run lint

      - name: Run frontend unit tests
        if: needs.changes.outputs.frontend_changed == 'true'
        working-directory: apps/tldw-frontend
        run: npm run test:run
