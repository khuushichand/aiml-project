            tldw_Server_API/tests/ChaChaNotesDB \
            --cov=tldw_Server_API --cov-report=xml --cov-report=term-missing --cov-append \
            --junit-xml="test-results-${{ matrix.os }}-3.12/ChaChaNotesDB.xml"

