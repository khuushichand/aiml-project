  full-suite-os:
    name: Full Suite (${{ matrix.os }} / Python 3.12)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: [lint, syntax-check]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    env:
      # Ensure Python can import the top-level package `tldw_Server_API` and scripts
      # by including the repository root on sys.path.
      PYTHONPATH: .
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
      TEST_MODE: 'true'
      DISABLE_HEAVY_STARTUP: '1'
      # Enable pytest-xdist parallelism for this heavy suite
      PYTEST_ADDOPTS: "-p xdist.plugin -n auto"
      # Allow mock-host test URLs in strict egress environments
      WORKFLOWS_EGRESS_ALLOWLIST: "93.184.216.34,does-not-resolve.invalid,example.com"
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Install FFmpeg (multi-OS)
        uses: ./.github/actions/setup-ffmpeg
        with:
          install-portaudio: 'true'

      - name: Setup Python and deps (with uv)
        uses: ./.github/actions/setup-python-deps
        with:
          python-version: '3.12'
          # Use uv on macOS, pip on Windows (leveraging pip cache on runners)
          use-uv: ${{ matrix.os != 'windows-latest' }}
          cache-dependency-path: |
            pyproject.toml
            uv.lock
          extras: dev

      - name: Ensure pytest-asyncio installed (OS matrix)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio

      - name: Verify pytest-asyncio import (OS matrix)
        shell: bash
        run: |
          python - <<'PY'
          try:
              import pytest_asyncio
              import importlib
              m = importlib.import_module('pytest_asyncio.plugin')
              print('pytest_asyncio OK:', getattr(pytest_asyncio, '__version__', 'unknown'))
          except Exception as e:
              print('pytest_asyncio import failed:', e)
              raise
          PY

      - name: Verify pytest-benchmark import (OS matrix)
        shell: bash
        run: |
          python - <<'PY'
          try:
              import importlib
              m = importlib.import_module('pytest_benchmark.plugin')
              print('pytest-benchmark OK')
          except Exception as e:
              print('pytest-benchmark import failed:', e)
              raise
          PY

      - name: Smoke start server (single-user)
        env:
          SERVER_LABEL: smoke
          AUTH_MODE: single_user
          SINGLE_USER_API_KEY: "smoke-ci-key-12345"
          E2E_TEST_BASE_URL: "http://127.0.0.1:8000"
          TEST_MODE: 'true'
          DISABLE_HEAVY_STARTUP: '1'
          STARTUP_TRACE: '1'
          MCP_DEBUG: '1'
          # Start the minimal test app profile for smoke to reduce startup cost
          MINIMAL_TEST_APP: '1'
          # Skip strict privilege catalog validation in smoke
          PRIVILEGE_METADATA_VALIDATE_ON_STARTUP: '0'
        shell: bash
        run: |
          python tldw_Server_API/tests/scripts/server_lifecycle.py start

      - name: Smoke health check (Windows, 15 min)
        if: ${{ always() && matrix.os == 'windows-latest' }}
        env:
          SERVER_LABEL: smoke
          E2E_TEST_BASE_URL: "http://127.0.0.1:8000"
          SMOKE_STARTUP_TIMEOUT_SECONDS: '900'
        shell: bash
        run: |
          python tldw_Server_API/tests/scripts/server_lifecycle.py health-check

      - name: Smoke health check (non-Windows)
        if: ${{ always() && matrix.os != 'windows-latest' }}
        env:
          SERVER_LABEL: smoke
          E2E_TEST_BASE_URL: "http://127.0.0.1:8000"
          SMOKE_STARTUP_TIMEOUT_SECONDS: '180'
        shell: bash
        run: |
          python tldw_Server_API/tests/scripts/server_lifecycle.py health-check

      - name: Print smoke server log on failure
        if: failure()
        env:
          SERVER_LABEL: smoke
        shell: bash
        run: |
          python - <<'PY'
          import os, pathlib
          label = os.environ.get('SERVER_LABEL','smoke')
          p = pathlib.Path(f'server-{label}.log')
          if p.exists():
              print('===== smoke server log =====')
              print(p.read_text(encoding='utf-8'))
          PY

      - name: Smoke stop server
        if: always()
        env:
          SERVER_LABEL: smoke
        shell: bash
        run: |
          python tldw_Server_API/tests/scripts/server_lifecycle.py stop || true

      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: models/embeddings
          key: ${{ runner.os }}-embeddings-static-v1
          restore-keys: |
            ${{ runner.os }}-embeddings-

      - name: Pre-download embedding models
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub
          python Helper_Scripts/download_embedding_models.py --target models/embeddings
          echo "TLDW_EMBEDDING_MODELS_DIR=models/embeddings" >> "$GITHUB_ENV"

      - name: Prepare test outputs directory
        shell: bash
        run: |
          rm -f .coverage coverage.xml || true
          mkdir -p "test-results-${{ matrix.os }}-3.12"

      - name: Run tests (root-level files)
        continue-on-error: true
        shell: bash
        run: |
          RESULTS_DIR="test-results-${{ matrix.os }}-3.12"
          MOD="root"
          set +e
          pytest -q --maxfail=1 --disable-warnings -p pytest_cov -p pytest_asyncio.plugin \
            -m "not jobs and not e2e" \
            tldw_Server_API/tests/test_*.py \
            --cov=tldw_Server_API --cov-report=xml --cov-report=term-missing --cov-append \
            --junit-xml="$RESULTS_DIR/root.xml"
