name: UI Characters Harness Tests

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "apps/packages/ui/src/components/Option/Characters/**"
      - "apps/packages/ui/src/utils/default-character-preference.ts"
      - "apps/packages/ui/src/utils/__tests__/default-character-preference.test.ts"
      - "apps/packages/ui/vitest.config.ts"
      - "apps/packages/ui/vitest.setup.ts"
      - "apps/tldw-frontend/vitest.config.ts"
      - "apps/tldw-frontend/vitest.setup.ts"
      - "apps/tldw-frontend/__tests__/vitest.setup-contract.test.ts"
      - "apps/packages/ui/package.json"
      - "apps/tldw-frontend/package.json"
      - "apps/bun.lock"
      - ".github/workflows/ui-characters-harness-tests.yml"
  push:
    branches:
      - main
    paths:
      - "apps/packages/ui/src/components/Option/Characters/**"
      - "apps/packages/ui/src/utils/default-character-preference.ts"
      - "apps/packages/ui/src/utils/__tests__/default-character-preference.test.ts"
      - "apps/packages/ui/vitest.config.ts"
      - "apps/packages/ui/vitest.setup.ts"
      - "apps/tldw-frontend/vitest.config.ts"
      - "apps/tldw-frontend/vitest.setup.ts"
      - "apps/tldw-frontend/__tests__/vitest.setup-contract.test.ts"
      - "apps/packages/ui/package.json"
      - "apps/tldw-frontend/package.json"
      - "apps/bun.lock"
      - ".github/workflows/ui-characters-harness-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-characters-harness-tests-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  characters-harness:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Frontend Characters Harness
            working_directory: apps/tldw-frontend
          - label: UI Package Characters Harness
            working_directory: apps/packages/ui

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install workspace dependencies
        working-directory: apps
        run: bun install --frozen-lockfile

      - name: Run characters harness
        working-directory: ${{ matrix.working_directory }}
        env:
          CI: "true"
        run: bun run test:characters-harness
