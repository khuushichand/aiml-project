name: Embeddings Pipeline Tests

on:
  pull_request:
    paths:
      - 'tldw_Server_API/app/core/Embeddings/**'
      - 'tldw_Server_API/app/api/v1/endpoints/embeddings_*'
      - 'tldw_Server_API/WebUI/**'
      - 'tldw_Server_API/tests/Embeddings/**'
      - '.github/workflows/embeddings-tests.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'tldw_Server_API/app/core/Embeddings/**'
      - 'tldw_Server_API/app/api/v1/endpoints/embeddings_*'
      - 'tldw_Server_API/WebUI/**'
      - 'tldw_Server_API/tests/Embeddings/**'

jobs:
  embeddings-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          # Minimal set to run embeddings unit tests (no heavy ML deps)
          pip install pytest hypothesis fastapi starlette pydantic loguru redis==5.* httpx

      - name: Run embeddings tests (fail-fast)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
          DISABLE_HEAVY_STARTUP: '1'
          TEST_MODE: 'true'
        run: |
          set -e
          pytest -q \
            tldw_Server_API/tests/Embeddings/test_dlq_admin_endpoints.py \
            tldw_Server_API/tests/Embeddings/test_dlq_roundtrip.py \
            tldw_Server_API/tests/Embeddings/test_storage_worker_idempotency.py \
            tldw_Server_API/tests/Embeddings/test_orchestrator_sse.py \
            tldw_Server_API/tests/Embeddings/test_message_validator.py \
            tldw_Server_API/tests/Embeddings/test_message_validator_fuzz.py \
            tldw_Server_API/tests/Embeddings/test_chunking_property_based.py \
            tldw_Server_API/tests/Embeddings/test_storage_idempotency_property.py \
            tldw_Server_API/tests/Embeddings/test_metrics_golden_contract.py \
            tldw_Server_API/tests/Embeddings/test_schema_drift.py \
            tldw_Server_API/tests/Embeddings/test_priority_routing.py \
            tldw_Server_API/tests/Embeddings/test_priority_bump_endpoint.py \
            tldw_Server_API/tests/Embeddings/test_backpressure_and_quotas.py \
            tldw_Server_API/tests/Embeddings/test_backpressure_media_endpoints.py

  redis-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    timeout-minutes: 10
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" \
          --health-interval 5s \
          --health-timeout 3s \
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest redis==5.* anyio

      - name: Run Redis-backed integration smoke tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
          REDIS_URL: redis://localhost:6379
        run: |
          pytest -q tldw_Server_API/tests/Embeddings/test_redis_integration_smoke.py
