name: UI Playground Quality Gates

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "apps/packages/ui/src/components/Option/Playground/**"
      - "apps/packages/ui/src/components/Common/Playground/**"
      - "apps/packages/ui/src/components/Sidepanel/Chat/**"
      - "apps/packages/ui/src/components/Layouts/**"
      - "apps/packages/ui/src/hooks/playground/**"
      - "apps/packages/ui/package.json"
      - "apps/bun.lock"
      - ".github/workflows/ui-playground-quality-gates.yml"
  push:
    branches:
      - main
    paths:
      - "apps/packages/ui/src/components/Option/Playground/**"
      - "apps/packages/ui/src/components/Common/Playground/**"
      - "apps/packages/ui/src/components/Sidepanel/Chat/**"
      - "apps/packages/ui/src/components/Layouts/**"
      - "apps/packages/ui/src/hooks/playground/**"
      - "apps/packages/ui/package.json"
      - "apps/bun.lock"
      - ".github/workflows/ui-playground-quality-gates.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-playground-quality-gates-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  playground-quality:
    name: Playground Device/A11y/Composer Gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install workspace dependencies
        working-directory: apps
        run: bun install --frozen-lockfile

      - name: Run composer usability gate
        working-directory: apps/packages/ui
        env:
          CI: "true"
        run: bun run test:playground:composer

      - name: Run device matrix gate
        working-directory: apps/packages/ui
        env:
          CI: "true"
        run: bun run test:playground:device-matrix

      - name: Run accessibility gate
        working-directory: apps/packages/ui
        env:
          CI: "true"
        run: bun run test:playground:a11y
