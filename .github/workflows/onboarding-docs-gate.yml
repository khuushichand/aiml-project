name: onboarding-docs-gate

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - README.md
      - Docs/**
      - Helper_Scripts/docs/**
      - tldw_Server_API/tests/Docs/**
      - .github/workflows/onboarding-docs-gate.yml
      - .github/workflows/onboarding-docs-smoke-nightly.yml
  push:
    branches:
      - main
      - dev
    paths:
      - README.md
      - Docs/**
      - Helper_Scripts/docs/**
      - tldw_Server_API/tests/Docs/**
      - .github/workflows/onboarding-docs-gate.yml
      - .github/workflows/onboarding-docs-smoke-nightly.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: onboarding-docs-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  onboarding-docs-gate:
    name: onboarding-docs-gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - name: Install FFmpeg and PortAudio (Linux)
        uses: ./.github/actions/setup-ffmpeg
        with:
          install-portaudio: 'true'

      - name: Setup Python and dependencies
        uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.12"
          use-uv: "true"
          cache-dependency-path: |
            pyproject.toml
            uv.lock
          extras: dev

      - name: Install MkDocs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-git-revision-date-localized-plugin

      - name: Refresh curated docs
        run: |
          chmod +x Helper_Scripts/refresh_docs_published.sh || true
          bash Helper_Scripts/refresh_docs_published.sh

      - name: Onboarding command boundary check
        run: |
          python Helper_Scripts/docs/check_onboarding_command_boundaries.py

      - name: Onboarding endpoint drift check
        run: |
          python Helper_Scripts/docs/check_onboarding_endpoint_drift.py

      - name: Docs test suite
        run: |
          python -m pytest -q -p pytest_asyncio.plugin tldw_Server_API/tests/Docs

      - name: MkDocs build
        run: |
          mkdocs build -f Docs/mkdocs.yml
