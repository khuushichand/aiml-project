name: Detect Required Gate Changes
description: Classify changed files and expose gate booleans for required CI lanes.

outputs:
  backend_changed:
    description: Whether backend-relevant paths changed.
    value: ${{ steps.classify.outputs.backend_changed }}
  frontend_changed:
    description: Whether frontend-relevant paths changed.
    value: ${{ steps.classify.outputs.frontend_changed }}
  tldw_frontend_changed:
    description: Whether the primary web frontend paths changed.
    value: ${{ steps.classify.outputs.tldw_frontend_changed }}
  family_guardrails_changed:
    description: Whether family guardrails browser-gate paths changed.
    value: ${{ steps.classify.outputs.family_guardrails_changed }}
  admin_ui_changed:
    description: Whether admin-ui paths changed.
    value: ${{ steps.classify.outputs.admin_ui_changed }}
  e2e_changed:
    description: Whether e2e-triggering paths changed.
    value: ${{ steps.classify.outputs.e2e_changed }}
  security_relevant_changed:
    description: Whether security-relevant paths changed.
    value: ${{ steps.classify.outputs.security_relevant_changed }}
  coverage_required:
    description: Whether coverage checks are required.
    value: ${{ steps.classify.outputs.coverage_required }}

runs:
  using: composite
  steps:
    - id: classify
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [[ -z "${BASE_SHA:-}" || "${BASE_SHA:-}" == "0000000000000000000000000000000000000000" ]]; then
          BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
        fi

        if [[ -n "${BASE_SHA:-}" ]]; then
          mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
        else
          mapfile -t CHANGED_FILES < <(git ls-files)
        fi

        python -m Helper_Scripts.ci.emit_ci_gate_flags "${CHANGED_FILES[@]}"
