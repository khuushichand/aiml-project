<!doctype html>
<html>
  <head>
    <title>tldw Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="manifest.type" content="browser_action" />
    <meta name="manifest.browser_style" content="false" />
    <link href="~/assets/tailwind.css" rel="stylesheet" />
    <meta charset="utf-8" />
    <script>
      // Set theme class synchronously to prevent flash of white background
      (function() {
        try {
          var theme = localStorage.getItem('theme') || localStorage.getItem('tldw-theme');
          if (!localStorage.getItem('theme') && localStorage.getItem('tldw-theme')) {
            localStorage.setItem('theme', localStorage.getItem('tldw-theme'));
          }
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || !theme || (theme === 'system' && prefersDark)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-bg">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
