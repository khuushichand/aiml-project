site_name: tldw Server Docs
site_description: Documentation for the tldw_server project
site_url: https://rmusser01.github.io/tldw_server/
repo_url: https://github.com/rmusser01/tldw_server
repo_name: rmusser01/tldw_server
edit_uri: edit/main/

# Only publish the curated set under Docs/Published
docs_dir: Published

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - content.action.view
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo

plugins:
  - search
  - git-revision-date-localized:
      enable_git_follow: false
      strict: false
      fallback_to_build_date: true
      enable_creation_date: true
      type: timeago
      locale: en

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - codehilite
  - footnotes
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist

extra:
  generator: false
  version: v0.1.19
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rmusser01/tldw_server
      name: GitHub
copyright: |
  © 2024-2025 tldw_Server - v0.1.19 - <a href="https://github.com/rmusser01/tldw_server">GitHub</a>

nav:
  - Home: Getting_Started/README.md
  - Overview: Overview/Feature_Status.md
  - Getting Started: Getting_Started/README.md
  - API:
      - Chat Workflows API: API-related/Chat_Workflows_API.md
      - Collections Feeds API: API-related/Collections_Feeds_API.md
      - Ingestion Sources API: API-related/Ingestion_Sources_API.md
      - Prompt Studio API: API-related/Prompt_Studio_API.md
  - Code:
      - Embeddings Documentation: Code_Documentation/Embeddings-Documentation.md
      - Tutorial System Developer Guide: Code_Documentation/Tutorial_System_Developer_Guide.md
      - Documentation Site Guide: Code_Documentation/Docs_Site_Guide.md
      - AuthNZ Code Guide: Code_Documentation/Guides/AuthNZ_Code_Guide.md
  - Deployment:
      - First-Time Production Setup: Deployment/First_Time_Production_Setup.md
      - Long-Term Admin Guide: Deployment/Long_Term_Admin_Guide.md
  - Environment Variables: Env_Vars.md
  - Monitoring:
      - Metrics Cheatsheet: Monitoring/Metrics_Cheatsheet.md
      - Alerts: Monitoring/Alerts/README.md
  - User Guides:
      - Authentication Setup: User_Guides/Server/Authentication_Setup.md
  - Release Notes: RELEASE_NOTES.md
