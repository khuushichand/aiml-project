global:
  resolve_timeout: 5m

route:
  receiver: tldw-alerts
  group_by: [service, alertname]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: tldw-alerts
    email_configs:
      - to: "alerts@example.com"
        from: "alertmanager@example.com"
        smarthost: "smtp.example.com:587"
        auth_username: "alertmanager@example.com"
        auth_password_file: "/etc/alertmanager/secrets/smtp_password"
        require_tls: true
        send_resolved: true
        headers:
          subject: "[tldw_server] {{ .CommonLabels.alertname }} ({{ .Status | toUpper }})"
    webhook_configs:
      - url: "https://example.com/alertmanager/webhook"
        send_resolved: true
