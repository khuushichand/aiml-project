<section class="metrics">
  <p class="kicker">{{metrics_kicker}}</p>
  <h2>{{metrics_title}}</h2>
  <div class="two-column">
    <div class="col card">
      <p class="muted">{{metric_label_1}}</p>
      <h3 class="accent">{{metric_value_1}}</h3>
      <p class="muted">{{metric_delta_1}}</p>
    </div>
    <div class="col card">
      <p class="muted">{{metric_label_2}}</p>
      <h3 class="accent">{{metric_value_2}}</h3>
      <p class="muted">{{metric_delta_2}}</p>
    </div>
  </div>
</section>
