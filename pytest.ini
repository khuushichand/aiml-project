[pytest]
asyncio_mode = auto
markers =
    jobs: Core Jobs tests (SQLite + PG)
    pg_jobs: Postgres-only Jobs backend tests (require JOBS_DB_URL and psycopg)
    pg_jobs_stress: Heavier Postgres concurrency stress tests (opt-in)
    slow: Tests that are intentionally slow or heavy
    integration: Integration tests that hit API/DB layers
    real_audit: Enable real UnifiedAuditService (no stub) and allow writing to per-user audit DBs
    timeout: Per-test timeout in seconds (pytest-timeout)
    unit: Unit tests that run quickly and do not require external services
    smoke: Opt-in smoke tests for heavier flows (set ALLOW_HEAVY_AUDIO_SMOKE=1 to enable)
    e2e: End-to-end tests requiring WebUI/runtime and external services
    external_api: Tests that call external APIs or require outbound network
    local_llm_service: Tests that require a locally running LLM service
addopts = -m "not e2e and not slow and not external_api"
filterwarnings =
    # Pydantic v2 deprecations
    ignore:`max_items` is deprecated and will be removed, use `max_length` instead:DeprecationWarning
    ignore:`min_items` is deprecated and will be removed, use `min_length` instead:DeprecationWarning
    ignore:Pydantic V1 style `@validator` validators are deprecated:DeprecationWarning
    ignore:Valid config keys have changed in V2:UserWarning
    ignore:`json_encoders` is deprecated:DeprecationWarning
    ignore:Using extra keyword arguments on `Field` is deprecated:DeprecationWarning
    ignore:`FieldValidationInfo` is deprecated:DeprecationWarning

    # FastAPI/Starlette deprecations
    ignore:on_event is deprecated, use lifespan event handlers instead:DeprecationWarning

    # Transformers cache deprecation
    ignore:Using `TRANSFORMERS_CACHE` is deprecated and will be removed in v5 of Transformers:FutureWarning

    # datetime.utcnow deprecation messages that may still appear in third-party or legacy paths
    ignore:datetime\.datetime\.utcnow\(\) is deprecated:DeprecationWarning

    # SWIG-related noisy deprecations from C extensions during import
    ignore:builtin type SwigPy.* has no __module__ attribute:DeprecationWarning
