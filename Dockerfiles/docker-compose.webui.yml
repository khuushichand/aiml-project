# docker-compose.webui.yml
# Overlay to run the Next.js WebUI container alongside the base API stack.
#
# Usage (from repo root):
#   docker compose --env-file tldw_Server_API/Config_Files/.env \
#     -f Dockerfiles/docker-compose.yml \
#     -f Dockerfiles/docker-compose.webui.yml up -d --build

services:
  webui:
    build:
      context: ..
      dockerfile: Dockerfiles/Dockerfile.webui
      # Quickstart defaults to same-origin browser requests with a server-side
      # rewrite to the internal Docker app service. Advanced users can still
      # provide NEXT_PUBLIC_API_URL for an explicit absolute browser API origin.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_API_VERSION: ${NEXT_PUBLIC_API_VERSION:-v1}
        NEXT_PUBLIC_X_API_KEY: ${NEXT_PUBLIC_X_API_KEY:-}
        NEXT_PUBLIC_TLDW_DEPLOYMENT_MODE: ${NEXT_PUBLIC_TLDW_DEPLOYMENT_MODE:-quickstart}
        TLDW_INTERNAL_API_ORIGIN: ${TLDW_INTERNAL_API_ORIGIN:-http://app:8000}
    image: tldw-webui:prod
    container_name: tldw-webui
    restart: unless-stopped
    ports:
      - "8080:3000"
    depends_on:
      app:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-}
      - NEXT_PUBLIC_TLDW_DEPLOYMENT_MODE=${NEXT_PUBLIC_TLDW_DEPLOYMENT_MODE:-quickstart}
      - TLDW_INTERNAL_API_ORIGIN=${TLDW_INTERNAL_API_ORIGIN:-http://app:8000}
