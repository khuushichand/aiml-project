global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts/tldw_alerts.yml

scrape_configs:
  - job_name: 'tldw_server'
    # tldw_server exposes Prometheus text at /api/v1/metrics/text
    metrics_path: /api/v1/metrics/text
    static_configs:
      - targets: ['host.docker.internal:8000']
