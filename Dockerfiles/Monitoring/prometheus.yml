global:
  scrape_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts/*.yml
  - /etc/prometheus/alerts/*.yaml
  - /etc/prometheus/alerts/extra/*.yml
  - /etc/prometheus/alerts/extra/*.yaml

scrape_configs:
  - job_name: 'tldw_server'
    # tldw_server exposes Prometheus text at /api/v1/metrics/text
    metrics_path: /api/v1/metrics/text
    static_configs:
      - targets: ['app:8000']
