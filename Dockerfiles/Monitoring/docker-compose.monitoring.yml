# Monitoring overlay for tldw_server.
# Usage (overlay — recommended):
#   docker compose -f Dockerfiles/docker-compose.yml -f Dockerfiles/Monitoring/docker-compose.monitoring.yml up -d
# NOTE: This is a compose overlay. prometheus.yml scrapes "app:8000" which
# requires the main docker-compose.yml stack to provide the "app" service.
# Running this file standalone will cause Prometheus scrape failures.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tldw_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../Docs/Operations/monitoring/prometheus_alerts_tldw.yml:/etc/prometheus/alerts/tldw_alerts.yml:ro
      - ../../Docs/Operations/monitoring/alerts:/etc/prometheus/alerts/extra:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - '9090:9090'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.30.1
    container_name: tldw_alertmanager
    volumes:
      - ${ALERTMANAGER_CONFIG:-../../Docs/Operations/monitoring/alertmanager_webhook_only.yml}:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - '9093:9093'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.2.2
    container_name: tldw_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?Set GRAFANA_ADMIN_USER before starting monitoring}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD before starting monitoring}
    ports:
      - '${GRAFANA_PORT:-3002}:3000'
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../Docs/Monitoring/Grafana_Dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  grafana_data:
