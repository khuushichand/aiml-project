# docker-compose.hosted-saas-prod.local-postgres.yml
# Optional emergency fallback overlay for hosted SaaS production.
#
# Usage (from repo root):
#   docker compose --env-file tldw_Server_API/Config_Files/.env.hosted-production.example \
#     -f Dockerfiles/docker-compose.hosted-saas-prod.yml \
#     -f Dockerfiles/docker-compose.hosted-saas-prod.local-postgres.yml up -d --build

services:
  app:
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-bookworm
    container_name: tldw-postgres-hosted-prod-fallback
    restart: unless-stopped
    ports: []
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tldw_production}
      POSTGRES_USER: ${POSTGRES_USER:-tldw_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${TLDW_POSTGRES_DATA_DIR:-/srv/tldw-data/postgres}:/var/lib/postgresql/data
