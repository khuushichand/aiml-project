# Generated by Helper_Scripts/Deployment/generate_sidecar_files.py. Edit Docs/Deployment/sidecar_workers_manifest.json and Docs/Deployment/Sidecar_Workers.template.md.
# docker-compose.workers.yml
# Sidecar Jobs workers for the core API stack.
# Use with the base compose file:
#   docker compose -f Dockerfiles/docker-compose.yml -f Dockerfiles/docker-compose.workers.yml up -d --build

x-worker-env: &worker-env
  AUTH_MODE: ${AUTH_MODE:-single_user}
  SINGLE_USER_API_KEY: ${SINGLE_USER_API_KEY:-change-me}
  tldw_production: ${tldw_production:-false}
  DATABASE_URL: ${DATABASE_URL:-sqlite:///./Databases/users.db}
  JOBS_DB_URL: ${JOBS_DB_URL:-}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-worker-base: &worker-base
  build:
    context: ..
    dockerfile: Dockerfiles/Dockerfile.prod
  image: tldw-server:prod
  restart: unless-stopped
  depends_on:
    - postgres
    - redis
  environment: *worker-env
  volumes:
    - app-data:/app/Databases
    - chroma-data:/app/Databases/user_databases

services:
  app:
    environment:
      - TLDW_WORKERS_SIDECAR_MODE=true

  worker-chatbooks:
    <<: *worker-base
    container_name: tldw-worker-chatbooks
    command: python -m tldw_Server_API.app.services.core_jobs_worker

  worker-files:
    <<: *worker-base
    container_name: tldw-worker-files
    command: python -m tldw_Server_API.app.core.File_Artifacts.jobs_worker

  worker-data-tables:
    <<: *worker-base
    container_name: tldw-worker-data-tables
    command: python -m tldw_Server_API.app.core.Data_Tables.jobs_worker

  worker-prompt-studio:
    <<: *worker-base
    container_name: tldw-worker-prompt-studio
    command: python -m tldw_Server_API.app.core.Prompt_Management.prompt_studio.services.jobs_worker

  worker-privilege-snapshots:
    <<: *worker-base
    container_name: tldw-worker-privilege-snapshots
    command: python -m tldw_Server_API.app.services.privilege_snapshot_worker

  worker-audio:
    <<: *worker-base
    container_name: tldw-worker-audio
    command: python -m tldw_Server_API.app.services.audio_jobs_worker

  worker-media-ingest:
    <<: *worker-base
    container_name: tldw-worker-media-ingest
    command: python -m tldw_Server_API.app.services.media_ingest_jobs_worker

  worker-evals-abtest:
    <<: *worker-base
    container_name: tldw-worker-evals-abtest
    command: python -m tldw_Server_API.app.core.Evaluations.embeddings_abtest_jobs_worker

  # optional
  worker-connectors:
    <<: *worker-base
    container_name: tldw-worker-connectors
    command: python -m tldw_Server_API.app.services.connectors_worker
